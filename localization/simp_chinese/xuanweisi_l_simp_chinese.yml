 ###宣慰司文本
 tianming.1.t:0 "建立北辰宣慰司"
 tianming.1.d:0 "北辰宣慰司的设立"
 tianming.1.f:0 "穷发之北，有冥海。极北之地，昼夜不易，星辰永驻。天极寒，土似冰，，鲜有人迹，谓之北辰。---《大明万国舆图》"
 tianming.1.a:0 "北疆自此永宁"

 tianming.2.t:0 "建立爔枫宣慰司"
 tianming.2.d:0 "爔枫宣慰司的设立"
 tianming.2.f:0 "远国疆之外，有枫国，穷目所见，爔枫不尽。罕人迹，其民砌冰为房，庐草结舍，或闻东部有色目人居之。---《大明万国舆图》"
 tianming.2.a:0 "通往红枫之地内陆的落脚点"

 tianming.3.t:0 "建立殷安宣慰司"
 tianming.3.d:0 "殷安宣慰司的设立"
 tianming.3.f:0 "玄鸟之地，穷宇之边。或曰商人避乱移居此地，故其民相貌有类华夏。然佛朗基并之，奴役久甚，故风俗不复焉。---《大明万国舆图》"
 tianming.3.a:0 "玄鸟永靖"

 tianming.4.t:0 "建立阳山宣慰司"
 tianming.4.d:0 "阳山宣慰司的设立"
 tianming.4.f:0 "极日出之地，山脉连绵。古人至此，望日出于山巅，故谓之阳山。其国向曰印加，为佛朗基所覆，其民黑发黄肤，有类中国。---《大明万国舆图》"
 tianming.4.a:0 "阳山永明"
 
 je_tianming_huangyuan_1:0 "建立煌原宣慰司"
 tianming.5.t:0 "建立煌原宣慰司"
 tianming.5.d:0 "煌原宣慰司的设立"
 tianming.5.f:0 "极东南之尽，有土曰煌原，去国四万万，而气节相易，昼夜颠倒。---《大明万国舆图》"
 tianming.5.a:0 "建立煌原宣慰司"
 
 tianming.6.t:0 "建立天竺宣慰司"
 tianming.6.d:0 "天竺宣慰司的设立"
 tianming.6.f:0 "天竺，向曰身毒，在西藏之西，灵山之南，古传之西天之地。陆路海路皆可通之。---《大明万国舆图》"
 tianming.6.a:0 "好的"
 
 tianming.7.t:0 "建立红林宣慰司"
 tianming.7.d:0 "红林宣慰司的设立"
 tianming.7.f:0 "阳山之外，西海之边，有土曰红林，土地沃然，林野不穷，然瘴气丛生，野兽横行。---《大明万国舆图》"
 tianming.7.a:0 "红林宣慰司"

 tianming.8.t:0 "建立河中宣慰司"
 tianming.8.d:0 "河中宣慰司的设立"
 tianming.8.f:0 "西域之外，更有荒原。谓之河中，向为帖木儿之土，其后分为数国。其民精商贸，善骑射，知礼教。虽为突厥之后，其风殊于蒙古。---《大明万国舆图》"
 tianming.8.a:0 "好的"
 
 tianming.9.t:0 "建立缅甸宣慰司"
 tianming.9.d:0 "缅甸宣慰司的设立"
 tianming.9.f:0 "缅甸者，三宣六慰之地，自永乐朝以来，归顺王华沐浴圣恩，后有雄主一统，抗拒天兵，谋以自立。---《大明万国舆图》"
 tianming.9.a:0 "建立缅甸宣慰司"

 tianming.10.t:0 "建立暹罗宣慰司"
 tianming.10.d:0 "暹罗宣慰司的设立"
 tianming.10.f:0 "真腊以西可抵暹罗，故为暹国、罗斛两国，并于一王，故此称呼。太祖九年，册封为暹罗王，传国至今四朝，其国王自名郑氏。"
 tianming.10.a:0 "暹罗宣慰司的设立"
 
