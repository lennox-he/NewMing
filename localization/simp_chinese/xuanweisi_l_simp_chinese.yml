 xuanweisi_events.9.t:0 "驱逐[SCOPE.sState('xuanweisi_quzhimin').GetName]殖民者"
 xuanweisi_events.9.d:0 "我国的[SCOPE.sState('xuanweisi_quzhimin').GetName]地区充斥着西方殖民者，他们随着残酷且血腥的殖民运动来到此地。"
 xuanweisi_events.9.f:0 "这里并非他们的家园，让他们把这里还给原住民吧。"
 xuanweisi_events.9.a:0 "是时候让他们回老家了"
 
 xuanweisi_events.10.t:0 "汉化[SCOPE.sState('xuanweisi_hanhua').GetName]地区"
 xuanweisi_events.10.d:0 "我国的[SCOPE.sState('xuanweisi_hanhua').GetName]地区已经成为了华人的聚集地，华人的涌入彻底地改变了当地的风俗文化，并融入了当地的社会。现在[SCOPE.sState('xuanweisi_hanhua').GetName]的华人已经产生了新的认同，他们认为此地也是自己的故土。"
 xuanweisi_events.10.f:0 "我们可以顺势而为，强化他们的乡土情结，把这里变成华人的法理文化故土。"
 xuanweisi_events.10.a:0 "此地安心为吾乡"
 
 xuanweisi_events.11.t:0 "汉化[SCOPE.sState('xuanweisi_hanhua').GetName]地区"
 xuanweisi_events.11.d:0 "[SCOPE.sState('xuanweisi_hanhua').GetName]地区的原住民已经被我们高贵的民族所取代，这里现在是我们的故土了！"
 xuanweisi_events.11.f:0 "我们可以顺势而为，强化他们的乡土情结，把这里变成华人的法理文化故土。"
 xuanweisi_events.11.a:0 "此地安心为吾乡"
 
 xuanweisi_events.12.t:0 "移交领土"
 xuanweisi_events.12.d:0 "我们有一块土地被认为是#BLUE 黎洲#!的一部分，我们应该交还给他们。"
 xuanweisi_events.12.f:0 "这代表了我们对属国的恩惠与仁慈。"
 xuanweisi_events.12.a:0 "好的"
 xuanweisi_events.12.b:0 "不行"
 
 xuanweisi_events.13.t:0 "恢复属国关系"
 xuanweisi_events.13.d:0 "因为中国人的突然袭击，我们断绝了与祖国的联系，是时候重新联系他们了。"
 xuanweisi_events.13.f:0 "作为大不列颠的殖民地，我们应该恢复我们之间的联系。"
 xuanweisi_events.13.a:0 "好的"
 
 xinying_yimin_33_de:0 "驱逐殖民者"
 xinying_yimin_33_de_desc:0 "我们应该驱逐位于我国国土上的西方殖民者，让他们回到自己的家乡。"
 
 xinying_yimin_34_de:0 "汉化地区"
 xinying_yimin_34_de_desc:0 "我国的一块地区华人大量聚集，已经融入了当地社会，此地已经被认为是汉人的故土之一。"
