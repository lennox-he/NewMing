 je_jap_18:0 "自由民权运动：民主化"
 je_jap_18_reason:0 "自改革以来，民主思想已经逐步开始在民间扩散。有识之士开始呼吁民众的觉醒，反对专制集权和君主独裁，为百姓争取自由民主的权利。"
