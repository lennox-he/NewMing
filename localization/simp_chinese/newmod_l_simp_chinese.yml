 tib_ter:0 "恐怖袭击"
 tib_sel:0 "自焚抗议"
 tib_sec:0 "抵抗组织"
 tib_con:0 "征服西藏"
 nongnu_lengque_tt:0 "一年的冷却期"
 
 je_unite_tib_3:0 "安抚西藏"
 je_unite_tib_3_reason:0 "和平统一在目前看来已经是不可能完成的任务了。因为我们与乌斯藏地区直接的武力冲突，西藏的僧侣集团公开号召藏人用暴动的形式反抗我们的统治。暴乱在帝国的各个藏人省份都有发生。\n因此，想要真正统治这里，我们必须得到西藏百姓的认可，这需要我们花费更大的精力，来争取广大藏族人民的支持，而不是讨好少数的贵族高层。当暴乱逐渐平息以后，藏人才能真正认可我们，成为我们密不可分的一部分。"
 je_unite_tib_3_goal:0 "我们可以等待藏人的暴乱自己结束，让时间冲刷掉一切。\n当然，我们也可以主动推动改革，获取藏人的认可。\n如果想要主动获得藏人认可，需要：\n1.在西藏地块进行农奴制改革，解放农奴。\n2.消除当地的动乱。\n3.获得10%的藏族效忠派。\n暴动就会自然消失。之后我们就可以彻底整合当地，获取藏人的认同。"
 
 button_tib1:0 "进行农奴制改革"
 button_tib1_desc:0 "为了争取藏族的支持，有必要帮助被压迫者打倒贵族和僧侣集团。"
 
