 je_china_shehuizhuyi_4: "改革开放:取消劳动保障"
 je_china_shehuizhuyi_4_reason: "为了团结工人阶层，我们曾制定了严苛的劳动保障制度。然而这种情况下，实业家和外国企业的投资热情被大大削减，他们无法承担高昂的劳保需求，害怕不谨慎的投资会在我国境内血本无归。不用担心，我们会扫清这最后的障碍。"
 je_sh4_tt: "完成#Bold 取消劳动保障#!日志"
 gk_gongren: "放宽限制"
 
 je_china_shehuizhuyi_5: "改革开放:吸引外资"
 je_china_shehuizhuyi_5_reason: "我们致力于缔造一个开放的中国，我们需要让全世界的资金进入中国，让海外资本引进来，没要留下来。在这些外国资本的帮助下，我们将在经济发展上获得更大的突破，加速中国的现代化进程！"
