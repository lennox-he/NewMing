 je_monglia_1:0 "统一草原"
 je_monglia_1_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]是普遍意义上的蒙古大汗，但是我们的治下的部落却各自为政。我们必须重申汗国的威严，重新统一草原！"
 je_monglia_1_lobby:0 "$je_monglia_1_reason$"
 je_monglia_1_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]的所有地区的动乱小于10%，维持君主制和独裁制，没有内战进度，维持十年。"
 je_monglia_1_success:0 "我们将建立一个广袤且统一的游牧帝国！"
 fail_je_monglia_1_tt:0 "蒙古帝国最终分崩离析。"
 
 je_monglia_2:0 "追求认可"
 je_monglia_2_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]曾经是庞大的帝国，后来逐步衰落，虽然可汗让我们团结一致，但是我们在国际舞台上的话语权依旧十分轻微，甚至被认为是不受认可的此等国家，我们要通过强有力的改革，完成现代化，争取我们应有的国际地位！"
 je_monglia_2_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]应该统治所有蒙古帝国的历史领土。"
 je_monglia_2_success:0 "蒙古帝国重现！"
 
 je_monglia_3:0 "重建元朝"
 je_monglia_3_reason:0 "元朝是蒙古人主导的中华帝国，是一个多元开放的混合帝国。我们应该重新入主中原，宣称我们的中国皇位！"
 je_monglia_3_lobby:0 "$je_monglia_3_reason$"
 je_monglia_3_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]应该统治所有元朝的历史领土。"
 je_monglia_3_success:0 "大元复辟！"
 
 je_monglia_4:0 "争夺哈密"
 je_monglia_4_reason:0 "哈密的政权实际上被我们的蒙古同胞所控制，但是他们现在却向明朝朝廷效忠，我们应该对哈密施加影响力，兵不血刃地将哈密争夺过来，成为我们的一部分。"
 je_monglia_4_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]可以对哈密施加影响力，通过一下几个方式：\n1,我国gdp超过5M\n 2,哈密与我国保持友好关系\n3,哈密不再是明朝附庸"
 je_monglia_4_tt:0 "哈密成为准噶尔的附庸"
 
 je_monglia_5:0 "蒙古大汗"
 je_monglia_5_reason:0 "准噶尔的统治建立在大汗的个人威望之上。只要大汗仍在，草原诸部尚能被汗庭约束；若大汗身死，各部的忠诚和汗国的未来都会陷入疑问。"
 je_monglia_5_lobby:0 "$je_monglia_5_reason$"
 je_monglia_5_goal:0 "维持大汗的权威。"
 
 je_monglia_6:0 "马背上的战士"
 je_monglia_6_reason:0 "我们蒙古人的立国之本乃是骑兵，如今世界局势殊异，很多人认为骑兵已经被历史所淘汰，而我们要告诉他们，我们蒙古的勇士只要在马背之上，就永远是无敌的存在，我们永不放弃自己的根本！"
 je_monglia_6_goal:0 "保证军队中有足够数量的骑兵"
 je_monglia_6_tt:0 ""
 
 houseman_mon: "蒙古骑兵"
 
 je_unite_tib:0 "册封西藏"
 je_unite_tib_reason:0 "乌斯藏都司归附[SCOPE.GetRootScope.GetCountry.GetName]已经数百年了，但是我们之间并没有建立明确的行政关系，而是作为册封的臣属徘徊在帝国的周围，我们必须加深我们之间的联系。"
 je_unite_tib_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]应该像元朝一样确立对高原的绝对权威！请维持与乌斯藏的良好附庸关系，维持君主制，融合格鲁派信仰或采取信仰自由法律，并持续十年。"
 je_unite_tib_success:0 "金瓶掣签制度被确立"
 
 je_unite_tib_1:0 "堪探西藏"
 je_unite_tib_1_reason:0 "乌斯藏都司的驿站早已荒废，[SCOPE.GetRootScope.GetCountry.GetName]需要重新堪探我们之间的道路，测绘新的行省地图，以便未来设置沟通高原的信息通道，保证天子的命令可以快速高效地传达到这里。"
 je_unite_tib_1_goal:0 "完成三次全部堪探。"
 je_unite_tib_1_goal_1:0 "1.堪探安多地区"
 je_unite_tib_1_goal_2:0 "2.堪探康区地区"
 je_unite_tib_1_goal_3:0 "3.堪探卫藏地区"
 
 je_unite_tib_2:0 "西藏探险"
 je_unite_tib_2_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]的冒险家已经出发，他们将从中原出发，翻过高山，穿过牧民的土地。观察沿途的人文地理，测绘一份详细的行省地图。"
 je_unite_tib_2_goal:0 "当测绘进度满格以后，我们会获得一份测量结果。"
 je_unite_tib_2_success:0 "探险圆满结束"
 
 monglia_events.1.t:0 "蒙古大汗"
 monglia_events.1.d:0 "[SCOPE.GetRootScope.GetCountry.GetName]脱胎于瓦剌部落，统治草原已经数百年了，但是东方崛起的满洲和东南的明朝都对我们造成了很大的威胁。\n虽然我们名义上是正统的蒙古大汗，但是蒙古部落并不都被我们管辖，有一半的蒙古喀尔喀部落向清朝臣服，另一半则在我们的庇佑下自治。我们必须重申蒙古帝国的权威！"
 monglia_events.1.f:0 "我们会完成成吉思汗未竟的事业。"
 monglia_events.1.a:0 "重整蒙古帝国"
 
 monglia_events.2.t:0 "蒙古统一"
 monglia_events.2.d:0 "蒙古部落已经被统一在[SCOPE.GetRootScope.GetCountry.GetName]的治下，现在是时候扩张我们的土地了！"
 monglia_events.2.f:0 "我们必须收复所有蒙古人的土地！"
 monglia_events.2.a:0 "蒙古帝国万岁！"
 monglia_events.2.b:0 "我们要重建元朝！"
 
 monglia_events.3.t:0 "世界征服者"
 monglia_events.3.d:0 "蒙古帝国已经重现，我们将为征服整个世界作为目标！"
 monglia_events.3.f:0 "世界将在蒙古人的治下享受安宁。"
 monglia_events.3.a:0 "征服世界"
 
 monglia_events.4.t:0 "大元帝国"
 monglia_events.4.d:0 "中国人已经臣服，我们可以宣布正统地位了！"
 monglia_events.4.f:0 "我们将成为正统的天子！"
 monglia_events.4.a:0 "登上皇位！"
 
