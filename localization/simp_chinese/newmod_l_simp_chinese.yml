 je_china_shehuizhuyi_6: "改革开放:贸易组织"
 je_china_shehuizhuyi_6_reason: "随着我们的经济不断发展，中国需要一个更紧密的组织将自己与世界相连接。我们需要加入一个足够庞大的国际组织来实现经济互助的目标，推动全球化潮流！"
