 ming_warlord_20_de:0 "制造领土冲突"
 ming_warlord_20_de_desc:0 "我们的军官渴望战争，我们可以让他们挑起与邻国的冲突，这可以让我们获得一个对邻国土地的宣称。"
 
 ming_warlord_21_de:0 "临时激励"
