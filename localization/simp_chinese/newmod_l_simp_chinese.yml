 sanjiao: "三教"
 je_sanjiao:0 "三教"
 je_sanjiao_reason:0 "作为一个非宗教化社会，中国往往"
 lengqueqi_tt:0 "不在冷却期内"
 ming_ronghe_de_desc:0 "我国并非单一的宗教国家，而是包容并蓄的自由信仰国家，虽然我们有名义上的国教，但是儒释道都是被视为于国教同等地位的教派。格鲁派虽然不同于寻常佛教，但是将他们整合入我们的信仰还是很有必要的。"
