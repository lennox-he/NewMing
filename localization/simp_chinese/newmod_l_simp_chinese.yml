 ming_events.35.t: "新方向！"
 ming_events.35.d: "随着改革的不断失败，民众和党内反对派对我们承诺的未来逐步失去信心。原领导人[SCOPE.sCharacter('cnm_zhixi').GetFullName]已被迫下台，是时候迎接新时代了！"
 ming_events.35.f: "所有这些变化都需要作出巨大的努力，都是在尖锐的斗争中进行的，都曾遇到旧的、过时的、反动的势力日益严重的反抗，这里既有过去的党和国家机构和经济结构，也有我们的习惯、思想偏见、平均主义和坐享其成的心理。这些变化遇到了我们的偏执、政治文化水平低下、对变革的恐惧心理。因此我们才损失了许多时间。旧体制瓦解之时，新体制尚未开始运作。于是社会的危机更加深重。我知道对目前严重局势的不满情绪，知道对各级行政当局和对我本人活动的尖锐批评。不过我想再次强调指出：在我们这样一个幅员广大又拥有如此遗产的国家里，根本性变革不可能在毫无痛苦、毫无困难和动荡的情况下进行。"
 ming_events.35.a: " 现在我们将拥抱自由！"
 
