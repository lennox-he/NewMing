 je_china_shehuizhuyi_7: "小康社会"
 je_china_shehuizhuyi_7_reason: "今大道既隐，天下为家，各亲其亲，各子其子，货力为己。大人世及以为礼，城郭沟池以为固，礼义以为纪，以正君臣，以笃父子，以睦兄弟，以和夫妇，以设制度，以立田里，以贤勇知，以功为己。故谋用是作，而兵由此起。禹、汤、文、武、成王、周公由此其选也。此六君子者，未有不谨于礼者也。以著其义，以考其信，著有过，刑仁讲让，示民有常，如有不由此者，在势者去，众以为殃。是谓小康。\n"
