 je_lanfang_haijun: "南洋舰队"
 je_lanfang_haijun_reason: "为了保护我们的贸易，我们必须在南海建立起我们的舰队存在，只有这样我们才能让我们的商船可以自由地扬帆到我们想要他们去的地方。"
 lanfang_haijun1: "扩建海军"
 lanfang_haijun2: "兰芳舰队"
 
 je_lanfang_nanyang: "接纳土著"
 je_lanfang_nanyang_reason: "我们的政府建立在当地酋长的支持之上，我们共同开发这片土地，创造繁荣的经济。但是随着城市的发展壮大，我们之间产生了隔阂。因为语言文化的原因，我们与婆罗洲的本地人产生的摩擦，他们也不能很好地融入我们的社会。因此我们需要想办法改善这一情况，将他们接纳进我们的国家！"
 je_lanfang_nanyang_goal: "满足以上目标十年，若拥有文化多元则为五年。"
 
 je_lanfang_farm: "扩展种植园"
 je_lanfang_farm_reason: "兰芳最出名的业务是矿产，其次则是这片富饶土地之上的密集种植园。得益于热带气候的滋润，婆罗洲的土地肥沃而富饶，让我们可以大量种植经济作物。我们必须抓紧机会，将兰芳种植园的名声尽早宣扬出去！"
 state_trait_nanyang: "兰芳种植园"
 
 je_lanfang_war: "兰和战争"
 je_lanfang_war_reason: "自吾国立业之始，荷兰国就是我国的头号威胁。夷人据爪哇，行大船，肆虐南海，侵略部族。吾民久为所害。此贼一日不逐，则邦国不可享一日之宁。"
 
 lan_events.2.t: "驱逐和夷"
 lan_events.2.f: "我们长久的宿敌与威胁#v $UNL$#!，已经被彻底驱逐出了[SCOPE.sStrategicRegion('indonesia_region').GetName]，达摩克里斯之剑已经被取下，接下来是我们掌控的时代了！"
 lan_events.2.d: "听说了吗？公司解散了！就是一直霸占南洋的荷属东印度公司！红毛夷终于还是狼狈地逃窜离开了这里。新政府正在清算那些曾经帮着这帮洋人为非作歹的恶徒！"
