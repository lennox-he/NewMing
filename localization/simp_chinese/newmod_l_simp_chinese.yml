 yimin_china_1_desc: "[TARGET_COUNTRY.GetName]人口众多，我们可以吸引一些没有土地的本地居民前往新大陆开拓殖民地。" 
 yimin_china_2_desc: "在新世界遇到的困难远比我们想得要多，为了解决瘴气的困扰，我们可以请求[TARGET_COUNTRY.GetName]协助研究。" 
 yimin_china_3_desc: "我们的财政已经捉襟见肘，一笔来自大明的拨款可以为我们雪中送炭！" 
 yimin_china_4_desc: "我们殖民地的潜力还有待开发，我们可以扩张可耕作土地来容纳更多人口。" 
 yimin_china_5_desc: "普天之下莫非王土，率土之滨莫非王臣。所有与我们相邻的殖民区域都应该属于我们的管辖。"
 yimin_china_6_desc: "行政机构的扩张让我们的官员捉襟见肘，我们应该向大明求助，获取一批文员帮我们处理内务。" 
 yimin_china_7_desc: "外交部门的扩张让我们的官员捉襟见肘，我们应该向大明求助，获取一批文员帮我们处理外务。" 
 yimin_china_8_desc: "对外战争让我国独木难支，我们可以向大明求助，帮我们击败外敌。" 
 yimin_china_9_desc: "我国对于教育的需求空前膨胀，让大明调拨一些教师和学校资源会是一个不错的选择。" 
 yimin_china_10_desc: "我国军队需要整顿，如果能得到大明的帮助，就能迅速提升我国军事实力。" 
 yimin_china_11_desc: "我国的建筑部门难以满足需求，向大明请求一批工匠援助能解决我们的燃眉之急。"
 yimin_china_12_desc: "是时候展现我们的忠诚了，我们将向大明朝贡，赢取大明的信赖。"
 
