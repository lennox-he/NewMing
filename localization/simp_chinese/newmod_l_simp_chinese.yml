 je_warfactory:0 "筹建兵工厂"
 je_warfactory_reason:0 "随着军事科技的进步，我国急需军事产业的扩张，这样才能为前线的士兵提供更加稳定的装备来源。因此，我们需要筹建一座巨型兵工厂。我们有以下几个选择。\n1，汉阳兵工厂，坐落在江汉平原。丰富的水源和广阔的平原非常适合我们扩张我们的军事产业。\n2，江宁制造总局，坐落于南京，拥有巨大的人力优势，可以吸引大量廉价劳动力。\n3，太原兵工厂。虽然地处偏远，但是太原一带矿产丰富，有利于降低我国军事工厂的原料价格。\n这只是暂行版本，新版本会为玩家开启不同的军工类型公司。等待p社更新。"
 
