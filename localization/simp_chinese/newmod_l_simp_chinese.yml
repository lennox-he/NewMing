 ming_warlord_22_de:0 "提拔海军"
 ming_warlord_22_de_desc:0 "海军也是我国的中坚力量，我们应该提拔海军士兵。"
 
 ming_warlord_23_de:0 "文官监军"
 ming_warlord_23_de_desc:0 "我们可以提拔一批文官监察军队，这将有效削减军队的势力。"
 
 ming_warlord_24_de:0 "改组兵部"
 ming_warlord_24_de_desc:0 "五军都督府已经落后于时代，是时候改组兵部，成立国防部了！"
