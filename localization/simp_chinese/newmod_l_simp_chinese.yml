 ming_warlord_24_1_tt:0 "五军都督府势力低于#GREEN 五十#!"
 ming_warlord_24_2_tt:0 "五军都督府态度高于#BLUE 认可#!"

 ming_warlord_25_de:0 "整顿土地"
 ming_warlord_25_de_desc:0 "这片土地曾经被军阀控制，现在我们需要重新登记管理这里。"
 
 ming_warlord_26_de:0 "获取阿克赛钦"
 ming_warlord_26_de_desc:0 "阿克赛钦是连接天山和阿里地区的重要补给线，我们应该让乌斯藏把这里交给我们。"
 
 ming_beijing_de_note:0 "定都北京"
 ming_beijing_de_note_desc:0 "我们回归了我们原本的首都。"
 
 ming_warlord_events.1.t:0 "文官与武将"
 ming_warlord_events.1.d:0 "土木堡事变之后，五军都督府的职权逐渐被文官取代。兵部逐渐取代了五军都督府的职权。郑成功将军恢复了这一机构，但是朝廷的官员对五军都督府的权力扩张感到担忧。"
 ming_warlord_events.1.f:0 "我们必须回应文官与武将的冲突"
 ming_warlord_events.1.a:0 "给予武将充分的信任，提高军费！"
 ming_warlord_events.1.b:0 "施行以文抑武的国策"
 ming_warlord_events.1.c:0 "同时打压他们两者，我们要用国库修缮皇宫！"
 
 ming_warlord_events.2.t:0 "[SCOPE.sState('current_robbing_provinces').GetName]的军队哗变"
 ming_warlord_events.2.d:0 "[SCOPE.sState('current_robbing_provinces').GetName]的部分军队对微薄的待遇感到不满，他们希望提高军费从而改善生活，目前他们已经聚集起来向朝廷抗议，我们必须谨慎处置他们。"
 ming_warlord_events.2.f:0 "这帮人简直无法无天！"
 ming_warlord_events.2.a:0 "派遣官军剿灭这帮闹事分子"
 ming_warlord_events.2.b:0 "为他们的诉求买单"
 ming_warlord_events.2.c:0 "默许他们的劫掠活动"
 
 ming_warlord_events.3.t:0 "[SCOPE.sState('current_robbing_provinces').GetName]之劫"
 ming_warlord_events.3.d:0 "在我们军队攻占了[SCOPE.sState('current_robbing_provinces').GetName]之后，一些不够安分的士兵劫掠了当地，造成了严重的破坏。"
 ming_warlord_events.3.f:0 "火光冲天，满地狼藉。"
 ming_warlord_events.3.a:0 "依法处置所有肇事者"
 ming_warlord_events.3.b:0 "从国库调给他们赏金，防止骚乱扩大"
 ming_warlord_events.3.c:0 "反正抢的不是我，让他们继续闹吧"
 
 ming_warlord_events.4.t:0 "军队里的裙带关系"
 ming_warlord_events.4.d:0 "一位低级军官在犯了严重的错误，按照法律，应该受到军事法庭的审判，但是他与[SCOPE.sCharacter('fubai_junguan').GetFullName]有着某些裙带关系，让他居然堂而皇之地躲过了惩罚。"
 ming_warlord_events.4.f:0 "这是赤裸裸的腐败行为！"
 ming_warlord_events.4.a:0 "对于这样的行为，我们必须严惩"
 ming_warlord_events.4.b:0 "作为战功赫赫的将领，[SCOPE.sCharacter('fubai_junguan').GetFullName]有这个权力"
 ming_warlord_events.4.c:0 "看来军队中的某些职务应该让文官进行管理"
 
 ming_warlord_events.5.t:0 "军队贪腐成风"
 ming_warlord_events.5.d:0 "军队的腐败已经非常严重了，很多项目支出出现了亏空，而且很多本来被划为军队屯田的土地也莫名其妙成为了某些富人的私有财产。"
 ming_warlord_events.5.f:0 "我们必须严查军队的腐败情况！"
 ming_warlord_events.5.a:0 "整治不良之风！"
 ming_warlord_events.5.b:0 "放任军队行为。"
 
 ming_warlord_events.6.t:0 "劣质军服"
 ming_warlord_events.6.d:0 "我们的供应商提供了一批劣质的军队制服，让我们的士兵感到非常不满。"
 ming_warlord_events.6.f:0 "劣质的军服根本不适合作战使用，士兵们都感到士气低迷。"
 ming_warlord_events.6.a:0 "该死"
 ming_warlord_events.6.b:0 "我们必须重新采购一批新的制服！"
 
 ming_warlord_events.7.t:0 "军队扩张势力"
 ming_warlord_events.7.d:0 "我们治下的将军试图扩张自己的私军，在[SCOPE.sState('duoqu_diqu').GetName]省份部署自己的军队势力。"
 ming_warlord_events.7.f:0 "军队的势力不断膨胀，我们很难遏制他们。"
 ming_warlord_events.7.a:0 "默许他的扩张。"
 ming_warlord_events.7.b:0 "严厉禁止这种行为，军队必须接受朝廷的管辖！"
 
 ming_warlord_events.8.t:0 "从军热"
 ming_warlord_events.8.d:0 "不同于旧帝国对军人的歧视，现在的大明王朝当兵是一件火热的职业，所有人趋之若鹜。"
 ming_warlord_events.8.f:0 "但是军队可能借助这个机会扩张自己的势力。"
