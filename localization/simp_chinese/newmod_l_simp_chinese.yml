 game_mod_events.4.b:0 "把这个无君无父的狗贼拉出去砍了"
 
 game_mod_events.5.t:0 "五军都督府的教程"
 game_mod_events.5.d:0 "五军都督府存在两个指标，忠诚度和势力值。势力值太高和忠诚度太低都会导致国家陷入军阀混战。其中，忠诚度用带有颜色的字表示：#GREEN 忠诚#!、#BLUE 认可#!、#BOLD 服从#!、#YELLOW 中立#!、#RED 抵触#!、#RED 反叛#!。一旦达到反叛，就会触发叛乱。一般来说，五军都督府应当保持在认可及以上的态度，对于你控制军队的势力会有帮助，当五军都督府处于中立及以下时，他们会迅速扩张自己的势力。\n势力值用总数为一百的进度条表示。达到一百时，意味着军队彻底夺取地方的控制权，天子失去权力，军队开始割据。军队的势力并非全是负面影响，当军队势力提高时，军队的战斗力也会相应提升。当然，随之提升的也有军队IG的势力和军队的工资。五军都督府的势力不适宜维持过高，那样会导致更频繁的军队事件触发。同时也不适合过低，极低的军队势力会导致军队将领集体不满。同时备受打压的军队也会像前宋军队一样失去战斗意志。"
 game_mod_events.5.f:0 "你有很多种方法控制军队的忠诚度和势力。\n1，如果想要提升忠诚度，可以尝试扶持军队IG，让军队IG对你达到喜爱，以及处于战争之中。这些会缓慢提升五军都督府的好感，但是并不能立刻看出效果。\n2，五军都督府的互动决议是提升好感度的好方法，给军队加工资，发放激励，提拔将领等等都会增加军队的忠诚度。对应的，其中大部分还会同时提升军队的势力。册封土地给军阀无疑是缓和矛盾的绝佳方法，但是要小心，拥有了太多土地的军阀，一旦挑起内战，将让你无从应对。而且赐予他们土地无疑会减缓改革速度。\n势力值的影响也是多种多样的，主要的决议都会影响势力的变化。这里介绍一些其他方法：\n1，军队IG举足轻重无疑会促进军队势力的增长，必须遏制他们。\n2，将军队放入内阁也会让他们增长自己的势力。除非你确实需要他们帮助来进行改革，否则最好不要让他们进入政府。\n3，打压或者扶持军队IG也会降低五军都督府的势力值，如果你有富裕的权威力，可以在需要的时候来遏制他们的扩张。\n4，文官监军是一个很好的快速降低势力值的方法，而且监军期间势力值也会持续降低，但是请确保军队的忠诚度，不要让他们因此而反叛。同时，文官监军也会降低军队的战斗力，请谨慎使用。"
 game_mod_events.5.a:0 "我明白了"
 
 #西南叛乱
 
 je_china_xinan: "安抚西南土司"
 je_china_xinan_reason: "西南土司最近怀揣异心，我们必须让他们明白天朝的威严，让他们恪守其责，成为帝国的边境的忠诚卫士。"
 anfu_xinan: "云南布政司"
 
 je_china_xinan_2: "麓川之战"
 je_china_xinan_2_reason: "西南边界冲突不断，最终演化成了如今的全面战争，西南的土司试图凭借地利抵抗朝廷大军，将西南变为他们的独立王国。"
 
 xinan_events.1.t: "安抚西南"
 xinan_events.1.d: "西南土司接受朝廷册封，替天朝把守边疆。但是据说最近随着边境的动乱，土司开始怀揣异心，试图与朝廷背心离德。我们必须遏制他们的小心思。"
 xinan_events.1.f: "羽檄如流星，虎符合专城。喧呼救边急，群鸟皆夜鸣。\n白日曜紫微，三公运权衡。天地皆得一，澹然四海清。\n借问此何为？答言楚征兵。渡泸及五月，将赴云南征。\n怯卒非战士，炎方难远行。长号别严亲，日月惨光晶。\n泣尽继以血，心摧两无声。困兽当猛虎，穷鱼饵奔鲸。\n千去不一回，投躯岂全生！如何舞干戚，一使有苗平！"
 xinan_events.1.a: "我们必须不计一切代价稳固南方！"
 
 xinan_events.2.t: "云南布政司"
 xinan_events.2.d: "西南土司已经平定，朝廷决定将此地划入云南布政司，"
 xinan_events.2.f: "羽檄如流星，虎符合专城。喧呼救边急，群鸟皆夜鸣。\n白日曜紫微，三公运权衡。天地皆得一，澹然四海清。\n借问此何为？答言楚征兵。渡泸及五月，将赴云南征。\n怯卒非战士，炎方难远行。长号别严亲，日月惨光晶。\n泣尽继以血，心摧两无声。困兽当猛虎，穷鱼饵奔鲸。\n千去不一回，投躯岂全生！如何舞干戚，一使有苗平！"
 xinan_events.2.a: "我们应该先着重发展归顺的土司地区！"
 xinan_events.2.b: "我们应该继续拓展南方边境！"
 
 ming_events.1:0 "残留的人头税"
 ming_events.1.t:0 "残留的人头税制度"
 ming_events.1.d:0 "几千年来，人头税都是中国的重要税收项目，通过户籍统计出人口的总数，再按照人丁数量计算出每人应当缴纳的税额。这是帝国稳定运行的基石。然而这种税收制度也绝非万能，藏匿人口的情况时有发生，这种制度也大大遏制了我国民众的生育欲望，毕竟多一个人就要多一份税收。"
 ming_events.1.f:0 "我国曾经的首相张居正曾经推行过一种被称为一条鞭税法的法律，用来改革这种制度。不过最终以失败告终。现在我们应当效仿先贤，完成税务制度的彻底革新。"
 ming_events.1.a:0 "我们必须推行摊丁入亩！"

 abolished_headtax_peasant_belief:0 "民众的耐心"
 ming_peasant_belief_bar:0 "民众的耐心"
 ming_peasant_belief_bar_desc:0 "民众的耐心#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!（[JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100）"
