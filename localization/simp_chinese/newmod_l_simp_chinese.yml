 #西藏
 
 tib_events.1.t:0 "乌斯藏都司"
 tib_events.1.d:0 "乌斯藏，帝国西南的边疆，自永乐时期，便并入了帝国的一部分。不过长久以来，帝国对这一地区的影响力极其有限。噶厦政府取代了帝国，对此地施行统治。我们应该和西藏地方政府加强合作，逐渐完成汉藏地区的合并统一。"
 tib_events.1.f:0 "要完成藏区的合并，需要我们改善与乌斯藏的关系直到50以上，然后将法律改为自由信仰，维持君主制，保持十年。"
 tib_events.1.a:0 "处理藏区问题"
 
 tib_events.2.t:0 "驻藏大臣"
 tib_events.2.d:0 "中原与西藏的联系已经空前紧密，皇帝陛下已经恩准了金瓶掣签，通过天子的名义，确认达赖喇嘛的合法性，并且尊重了西藏的宗教。西藏人都逐渐认同了自己位于[SCOPE.sState('capital_state').GetName]的天子，并把他尊为佛教的文殊菩萨转生。"
 tib_events.2.f:0 "我们会派遣驻藏大臣，控制噶厦政府的各个方面，加速他们与中原的统一。"
 tib_events.2.a:0 "好的"
 
 tib_events.3.t:0 "达赖出逃"
 tib_events.3.d:0 "随着我们的征服了藏区，不满我国政策的达赖喇嘛仓皇逃出拉萨，到达了[SCOPE.sCountry('taowang_target').GetName]，并号召所有藏族人抵抗我们的统治。"
 tib_events.3.f:0 "他们不过是一群不自量力的蝼蚁，我们会稳定一切。"
 tib_events.3.a:0 "不用管那个懦夫。"
 
 tib_events.4.t:0 "合并乌斯藏"
 tib_events.4.d:0 "噶厦政府的使命已经结束，接下来，乌斯藏将废除宣慰司，正式升格为布政司，统治者也从僧侣和驻藏大臣变成布政使和巡抚。西藏已经彻底并入帝国，西藏人也正式成为了帝国的一等公民。"
 tib_events.4.f:0 "汉藏统一。"
 tib_events.4.a:0 "万岁！"
 
 tib_events.5.t:0 "完成安多堪探"
 tib_events.5.d:0 "我们绘制了安多地区的地图。"
 tib_events.5.f:0 "完毕。"
 tib_events.5.a:0 "成功了。"
 
 tib_events.6.t:0 "完成西康堪探"
 tib_events.6.d:0 "我们绘制了西康地区的地图。"
 tib_events.6.f:0 "完毕。"
 tib_events.6.a:0 "成功了！"
 
 tib_events.7.t:0 "完成卫藏堪探"
 tib_events.7.d:0 "我们绘制了卫藏地区的地图。"
 tib_events.7.f:0 "完毕。"
 tib_events.7.a:0 "成功了！"
 
 tib_events.8.t:0 "翻越雪山"
 tib_events.8.d:0 "我们遇到了一座雪山，翻过他可以节约探险队的大量时间，但是这一举动也非常冒险。"
 tib_events.8.f:0 "如果我们翻越雪山，可能会导致我们不得不放弃许多辎重。"
 tib_events.8.a:0 "值得冒险"
 tib_events.8.b:0 "想办法绕过去吧"
 
 tib_events.9.t:0 "成功翻越雪山"
 tib_events.9.d:0 "我们的探险者成功翻越了雪山。"
 tib_events.9.f:0 "尽管雪山陡峭和危险，我们仍设法躲过了危险区域，成功到达了另一侧山脉，相关的数据已经被记录下来，工作正在快速推进。"
 tib_events.9.a:0 "成功了！"
 
 tib_events.10.t:0 "遭遇暴风雪"
 tib_events.10.d:0 "我们很不幸遭遇了暴风雪，不得不折返回去。"
 tib_events.10.f:0 "我们没有通过雪山的考研，物资逐渐散落，方向也迷失。我们不得不寻找出口，折返到山脚，另外寻找其他通道。"
 tib_events.10.a:0 "真可惜！"
 
 tib_events.11.t:0 "顺利地堪探工作"
 tib_events.11.d:0 "我们的探险者来到了一片风景优美的原野，这里气候温和，野生动物众多，河流也很丰富。"
 tib_events.11.f:0 "难得的闲暇时刻。"
 tib_events.11.a:0 "非常棒！"
 
 tib_events.12.t:0 "三江源"
 tib_events.12.d:0 "神迹！我们发现了三江源！"
 tib_events.12.f:0 "经过我们的堪探，这片区域是长江，黄河以及澜沧江的源头，拥有非常充沛的水源，得知了母亲河的源头，整个[SCOPE.GetRootScope.GetCountry.GetName]的百姓都无比振奋！"
 tib_events.12.a:0 "好消息！"
 
 tib_events.13.t:0 "与当地人交易"
 tib_events.13.d:0 "我们遇到了当地藏人，他们可以帮助我们。"
 tib_events.13.f:0 "如果我们肯为他们的地图支付一些钱的话。"
 tib_events.13.a:0 "支出这笔钱！"
 tib_events.13.b:0 "我们自己能走！"
 
 tib_events.14.t:0 "朝圣者"
 tib_events.14.d:0 "朝圣是藏传佛教的一种习俗，藏人会用身体丈量到布达拉宫的距离，表达自己对信仰的虔诚。。"
 tib_events.14.f:0 "真是伟大的壮举。"
 tib_events.14.a:0 "分给朝圣者一些食物"
 tib_events.14.b:0 "别看了，我们还有工作要做"
 
 tib_events.15.t:0 "购买补给"
 tib_events.15.d:0 "我们来到了一个居民点，探险家们希望可以在这里稍作休息，购买一些补给。"
 tib_events.15.f:0 "友善的藏族村庄让大家流连忘返。"
 tib_events.15.a:0 "买一些补给，整顿整顿队伍！"
 tib_events.15.b:0 "休息休息就出发吧！"
 
 tib_events.16.t:0 "放牧的牧民"
 tib_events.16.d:0 "我们遇见了放牧的牧民，但队员们在是否与牧民换取食物上产生了分歧。"
 tib_events.16.f:0 "我们已经许久没吃肉了。"
 tib_events.16.a:0 "我们应该与牧民交换！"
 tib_events.16.b:0 "我们应该拿枪去抢！"
 
 tib_events.17.t:0 "新奇的植物"
 tib_events.17.d:0 "我们的队员在路上发现了一株从未见过的奇特植物。"
 tib_events.17.f:0 "这是白菜吗？"
 tib_events.17.a:0 "很好，把它记录下来！"
 tib_events.17.b:0 "不要耽误我们的工作！"
 
 tib_events.18.t:0 "高原反应"
 tib_events.18.d:0 "一位队员缺氧了，但最近的探险点距离还有一个时辰的路程。"
 tib_events.18.f:0 "真糟糕！"
 tib_events.18.a:0 "我们毫无办法！"
 tib_events.18.b:0 "我们不能放弃他！"

 tib_events.19.t:0 "牦牛"
 tib_events.19.d:0 "一只浑身长着长毛的牛出现在我们的视野中，它应该是跟族群走散了。"
 tib_events.19.f:0 "奇形怪状，哪有毛那么长的牛！"
 tib_events.19.a:0 "它是我们的补给。"

 tib_events.20.t:0 "奔腾的藏羚羊"
 tib_events.20.d:0 "那是什么，一群奔腾而来的羚羊！"
 tib_events.20.f:0 "妈的，一群疯羊！"
 tib_events.20.a:0 "快避开！"
 tib_events.20.b:0 "猎杀他们！"

 tib_events.21.t:0 "风和日丽"
 tib_events.21.d:0 "当我们走出帐篷时，发现天气意外的不错。"
 tib_events.21.f:0 "天气好心情好。"
 tib_events.21.a:0 "探险的好日子！"

 tib_events.22.t:0 "雪豹"
 tib_events.22.d:0 "我们发现在远处的小山坡上，有一只雪白的豹子。"
 tib_events.22.f:0 "多美的生物！"
 tib_events.22.a:0 "抓住它献给陛下！"
 tib_events.22.b:0 "我们不应该招惹它！"

 tib_events.23.t:0 "失踪"
 tib_events.23.d:0 "清晨醒来，发现少了一名探险队员！"
 tib_events.23.f:0 "他去哪里了？！"
 tib_events.23.a:0 "必须找到他！"
 tib_events.23.b:0 "不能因为他耽误探险进度！"

 tib_events.24.t:0 "找到失踪队员"
 tib_events.24.d:0 "我们在一处山沟里发现了被困的探险队员！"
 tib_events.24.f:0 "总算找到了！"
 tib_events.24.a:0 "谢天谢地！"

 tib_events.25.t:0 "我们没能找到那名队员"
 tib_events.25.d:0 "妈的，这可不是一个好消息！"
 tib_events.25.f:0 "只能为他祈祷了！"
 tib_events.25.a:0 "你会魂归故里的！"

 tib_events.26.t:0 "湖泊"
 tib_events.26.d:0 "在我们许久没有得到补给时，我们眼前出现了一片湛蓝的湖。"
 tib_events.26.f:0 "多美啊，和江南一样！"
 tib_events.26.a:0 "下湖捕鱼！"
 tib_events.26.b:0 "谨慎的钓鱼。"

 tib_events.27.t:0 "寺庙"
 tib_events.27.d:0 "我们遇到了一座寺庙，队员们都希望能够进入寺庙为自己祈福。"
 tib_events.27.f:0 "大家都想向佛陀祈愿自己能平安回家。"
 tib_events.27.a:0 "好吧，我也想为自己祈福。"

 #清朝事件
 
 qing_events.1.t:0 "征服蒙古"
 qing_events.1.d:0 "蒙古高原已经服从皇帝，我们现在已经加冕蒙古的大汗了！"
 qing_events.1.f:0 "自两百年前，我们击败林丹汗以来，大清帝国就夺取了元朝的传国玉玺，宣称了对草原的统治。东喀尔喀蒙古随后归附了大清的统治，但是西部的准噶尔蒙古在噶尔丹的率领下反抗我们的统治。现在我们终于击败了我们的敌人，夺回了整个草原。锡林郭勒的蒙古八旗都感到十分振奋，蒙古贵族纷纷来到[SCOPE.sState('capital_state').GetName]，为我们准备可汗的加冕仪式。"
 qing_events.1.a:0 "太好了"
 
 qing_events.2.t:0 "十全武功"
 qing_events.2.d:0 "皇帝[SCOPE.sCharacter('shiquan').GetFirstName]正雄心勃勃地准备着自己的事业。"
 qing_events.2.f:0 "帝国周边危机四伏，我们需要激励人心的胜利来振兴帝国。我们的皇帝[SCOPE.sCharacter('shiquan').GetFirstName]雄心勃勃，我们一定能在他的领导下实现全面的崛起！"
 qing_events.2.a:0 "消灭一切阻挡我们的敌人！"
 
 qing_events.3.t:0 "处置汉人"
 qing_events.3.d:0 "[SCOPE.sCharacter('shiquan').GetFirstName]虽然是满人，但是[SCOPE.GetRootScope.GetCountry.GetName]的主要支柱仍然是汉人。如今我们已经让汉人重新归顺了我们的帝国，如何处置他们以及他们的文化成了亟待解决的问题。"
 qing_events.3.f:0 "帝国周边危机四伏，我们需要激励人心的胜利来振兴帝国。我们的皇帝[SCOPE.sCharacter('shiquan').GetFirstName]雄心勃勃，我们一定能在他的领导下实现全面的崛起！"
 qing_events.3.a:0 "我们必须让汉人剃发以示归顺！"
 qing_events.3.b:0 "顺应天命接受汉化才是最好的选择！"
 
 qing_events.4.t:0 "四库全书完稿！"
 qing_events.4.d:0 "按照皇帝陛下的要求，我们的四库全书终于定稿完成，这部史无前例的百科全书将彰显我们帝国的荣耀！"
 qing_events.4.f:0 "《四库全书》既然要囊括以前的历代典籍，涵盖了所有传统学术书籍，用传统目录学将典籍按照一定的体系加以排纂编次，将浩如烟海的各类书籍汇总成册，同时广泛收集海外各类学说，亦作经史子集的分类，包括国外神话传说、史诗歌剧、科学论著以及文学集合。"
 qing_events.4.a:0 "书海无涯，吾心亦无涯！"
 siku_china: "四库全书"

 qing_events.5.t:0 "广州港扩建！"
 qing_events.5.d:0 "广州作为帝国的门户，拥有优秀的港湾和繁荣的经济。如今我们已经将广州港升级完毕，他将作为帝国的明珠，向世界展现我们的光彩！"
 qing_events.5.f:0 "诸人政坐爱闲游，天遣南游天尽头。到得广州天尽处，方教回首向韶州。"
 qing_events.5.a:0 "我们要建设一个开放的帝国！"
 
 qing_events.6.t:0 "俄清友好条约"
 qing_events.6.d:0 "俄罗斯同意在战争中援助我们但条件是我们接受他们的条约。"
 qing_events.6.f:0 "大清国大皇帝大俄国大皇帝愿将两国边界及通商等事于两国有益者，商定妥协，以固和好，是以特派全权大臣会同商定。大清国钦差出使俄国全权大臣一等毅勇侯大理寺； 大俄国钦差参政大臣署理总管外部大臣，参议大臣出使中国全权大臣布； 两国全权大臣各将所奉全权谕旨互相校阅后，议定条约如左：......"
 qing_events.6.a:0 "我们只能接受他们的要求"

 tifa_qing:0 "强制剃发令"
 anfu_qing:0 "新朝雅政"
 end_ming:0 "灭亡明朝"
 outsea_qing:0 "四海咸服"
 qing_kaifang:0 "开放的中国"
 
 je_annex_monglia:0 "满蒙联盟"
 je_annex_monglia_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]与蒙古的情谊非同寻常，作为血缘亲近的兄弟，满蒙的联姻一直不曾断绝。但是蒙古的土地却被人为地割裂开来，东部仍处于大清的统治，西部则被准噶尔汗国占据。我们统治下的蒙古八旗希望能够实现统一，我们应该拥有整个蒙古草原。"
 annex_monglia_tt:0 "统一蒙古草原，获取蒙古贵族的认可。"
 
 je_shiquan_china:0 "十全武功"
 je_shiquan_china_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]的皇帝并非池中之物，他正雄心勃勃地试图振兴整个帝国，如果我们能在他的统治下实现所有的雄心，那么全世界都将为我们而战栗。"
 je_shiquan_china_goal:0 "#Bold 皇帝的十全武功将获得认可#!"
 shiquan_china_tt:0 "皇帝的十全武功将获得认可。"
 shiquan_menggu_tt:0 "征服蒙古\n    完成满蒙联盟日志"
 shiquan_zhungaer_tt:0 "终结准噶尔\n    完成终结准噶尔日志"
 shiquan_chaoxian_tt:0 "吞并朝鲜\n    将朝鲜地区彻底吞并"
 shiquan_xizang_tt:0 "统治西藏\n    吞并整个青藏高原区域或傀儡西藏"
 shiquan_huabei_tt:0 "占据华北\n    控制整个华北区域"
 shiquan_nanfang_tt:0 "剑指南方\n    控制整个华南区域"
 shiquan_yuenan_tt:0 "降伏安南\n    控制整个越南"
 shiquan_miandian_tt:0 "击败缅甸\n    控制或傀儡缅甸"
 shiquan_wubei_tt:0 "整顿武备\n    完成革新八旗"
 shiquan_haijun_tt:0 "发展海军\n    研发铁甲舰科技"
 shiquan_shibai_tt:0 "皇帝在我们完成所有目标前就已经逝世。"
 
 shiquan_qing:0 "十全武功"
 
 je_destory_banner:0 "革新八旗"
 je_destory_banner_reason:0 "八旗制度曾经是[SCOPE.GetRootScope.GetCountry.GetName]的中流砥柱，他们帮助我们征服敌人，包围国土，同时也是皇帝陛下最忠诚的侍卫。然而随着时间的流逝，八旗制度已经变得臃肿而落后了，我们需要重新对其进行革新，让我们的军队能追赶上世界的潮流。"
 je_shiquan_china_tt:0 "十全武功的进度获得提升。"
 
 je_destory_canquerkor:0 "征服朝鲜"
 je_destory_canquerkor_reason:0 "朝鲜国王已经龟缩在我们的荫蔽下很久了，是时候剥夺他们的独立地位，让他们彻底成为帝国的一部分了。"
 
 kor_qing:0 "整合朝鲜"
 
 je_destory_tibback:0 "夺取西藏"
 je_destory_tibback_reason:0 "西藏的喇嘛尚未向天子效忠，我们必须赶走前朝余孽和其他势力，彻底控制高原地区，让活佛重新回到我们的掌控之中。"
 
 je_destory_norchi:0 "巩固华北"
 je_destory_norchi_reason:0 "是时候南下征服中原了！华北是中国的发源地，人口密集，农业繁荣，我们需要用强有力的手段巩固我们在华北地区的统治，把天子的号令传到每一个角落。"
 
 je_destory_end_ming:0 "终结明朝"
 je_destory_end_ming_reason:0 "虽然在与我们的对抗中不断溃败，大明依旧龟缩在中国南方苟延残喘。我们应当乘胜追击，一举终结明朝的统治，让我们的王朝成为中原大地的唯一统治者。"
 
 je_destory_outsea:0 "海外咸服"
 je_destory_outsea_reason:0 "国内的战事暂时告一段落，但是海外尚有许多曾经向明朝效忠的华夏邦国的存在，我们应当继承大明的地位，将他们囊括到我们的统治之下。"
 
 je_destory_siku:0 "四库全书"
 je_destory_siku_reason:0 "我们必须证明我们是中国最强盛、最伟大的王朝，因此，我们应当着手编撰一本空前绝后的百科全书。这本书将会囊括世界上各类书籍记载，包罗万象，成为可以找到任何你想要找到的只是的宝库。我们要让他超越西方的不列颠百科全书，成为凝聚我们民族自信力的代表作。"
 je_destory_siku_goal:0 "完成整本书的编写"
 
 je_destory_guangzhou:0 "广州口岸"
 je_destory_guangzhou_reason:0 "广州是我国最繁荣最自由的贸易港，我们应该加紧建设这里，把这里作为我们与世界交流的核心。同时，加强贸易管理也能强化我们的统治能力和贸易主权。"
 
 je_destory_banner2:0 "创立新军"
 je_destory_banner2_reason:0 "新式军队已经在全世界开始流行，我们必须继续对八旗军队进行全方位的改革，以适应新战场的要求。"
 
 journal_entry_goal_progress_siku:0 "四库全书编撰速度：#variable [ROOT.GetCountry.MakeScope.Var('qing_siku_var_1').GetValue|0]#!（#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_siku_power_var_tooltip [ROOT.GetCountry.MakeScope.Var('qing_siku_var_pro').GetValue|1-=]#!）"
 
