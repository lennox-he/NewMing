 game_mod_events.4.t:0 "朝鲜献印"
 game_mod_events.4.d:0 "随着我们的大军踏上了朝鲜的土地，朝鲜国王惊慌失措，希望我们念在旧时的藩属关系上对朝鲜手下留情。"
