 identity_tianchao:0 "天朝上国"
 identity_tianchao_desc:0 "普天之下莫非王土，率土之滨莫非王臣。天朝上国是天子统御八荒的组织，尽管还有不服教化的野蛮人游离于文明的中心之外。番邦紧紧地团结在天朝皇帝的身边，组成一个以经济为主的共同体。天朝皇帝对四周的夷狄进行教化，帮助他们融入帝国的核心，成为中华文明的一部分。"
 
