 je_jap_17:0 "海陆之争"
 je_jap_17_reason:0 "维新以来，长州与萨摩的冲突便没有停止过。作为帝国的海军与陆军，我们需要安抚他们，让他们能够忠心地为帝国服务。"
 je_jap_17_goal:0 "为了让海军与陆军更稳定地合作，我们需要让他们的支持度保持大致相等。"
 je_jap_17_fail:0 "独走度过高意味着军队彻底失控，海陆冲突会彻底摧毁帝国！"
 
