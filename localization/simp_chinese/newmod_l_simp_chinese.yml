 tib_events.50.t:0 "[SCOPE.sState('tib_baoluan').GetName]的暴乱已经平息"
 tib_events.50.d:0 "在[SCOPE.sState('tib_baoluan').GetName]的暴乱已经逐步平息，当地的极端分子已经被逮捕和再教育。宗教神权已经成为遥远的历史，当地人开始追求新的生活了。"
 tib_events.50.f:0 "已经没有人再听从达赖的号召了，农奴从土地中解放，被压迫者重获了新生，他们发现，也许遵从一个虚无缥缈的神，并不一定就是他们生命最大的追求。人们以最快的速度拥抱着新的生活。"
 tib_events.50.a:0 "谢天谢地，一切结束了"
 
 tib_events.51.t:0 "[SCOPE.sState('tib_baoluan').GetName]的恐怖袭击"
 tib_events.51.d:0 "[SCOPE.sState('tib_baoluan').GetName]的密宗狂热分子，在达赖的号召下开始了暴乱行动，对当地平民开展无差别袭击。"
 tib_events.51.f:0 "暴徒们像蝗虫一样在城市里横冲直撞，打砸，焚烧，杀戮，，，，宛如人间炼狱。"
 tib_events.51.a:0 "必须制裁他们"
 
 tib_events.52.t:0 "[SCOPE.sState('tib_baoluan').GetName]的僧侣自焚"
 tib_events.52.d:0 "[SCOPE.sState('tib_baoluan').GetName]的密宗狂热分子，为了表达对宗教和活佛的忠诚，在市中心进行了张扬的自焚活动，表达对政府的抗议。"
 tib_events.52.f:0 "熊熊烈火突然升起，人群惊慌逃窜。当警察赶到灭火时，只剩下黑黢黢的地面和一些尸体的灰尘。其身虽死，却激发了更多卫道士的怒火。"
 tib_events.52.a:0 "必须制裁他们"
 
 tib_events.53.t:0 "[SCOPE.sState('tib_baoluan').GetName]的分离主义宣传"
 tib_events.53.d:0 "我们在[SCOPE.sState('tib_baoluan').GetName]发现了大量的分离主义宣传，他们编造了大量民族冲突的事实，用以鼓励分离主义。"
 tib_events.53.f:0 "如果不及时阻止这些有害内容的传播，很可能回造成难以预料的后果。"
 tib_events.53.a:0 "让特勤局处理这些人。"
 tib_events.53.b:0 "多加注意就行了。"
 
 tib_events.54.t:0 "在[SCOPE.sState('tib_baoluan').GetName]废除农奴制"
 tib_events.54.d:0 "[SCOPE.sState('tib_baoluan').GetName]的农奴得到了解放，我们彻底打倒了当地的贵族僧侣，将权力还给了农民。"
 tib_events.54.f:0 "我们是作为解放者而非征服者来到这里。"
 tib_events.54.a:0 "好的"
 
 tib_events.55.t:0 "镇压[SCOPE.sState('tib_baoluan').GetName]的暴乱"
 tib_events.55.d:0 "[SCOPE.sState('tib_baoluan').GetName]的暴乱已经被我们镇压，当地居民已经其他效忠于帝国的人口替换。这里不会再有暴动了。"
 tib_events.55.f:0 "对付这些暴徒就该用点血腥的手段！"
 tib_events.55.a:0 "继续杀！"
 
 ming_tib_gaitu:0 "西藏农奴制改革"
 
 je_china_industry:0 "中国工业化"
 je_china_industry_reason:0 "实业兴国，我国绝不能落于世界之后！随着技术的各种进步，各式的新奇物件层出不穷，而社会生产也发生了翻天覆地的变化。我们必须紧跟潮流，进行全方位的工业化，来保证我们能跟随世界的脚步！"
 ming_industry:0 "中国工业"
 
 je_rebuild_world:0 "重塑世界秩序"
 je_rebuild_world_reason:0 "当今的世界体系基本上是由西方列强所设立的，他们设定了所谓“文明”的标准，肆意对他人进行划分和指点。将他们看不上的异国统统贬为野蛮人。我们已经受够了这种歧视，总有一天，我们要重塑整个世界的秩序，让我们成为唯一的标准和中心！"
 je_rebuild_world_goal:0 "为了完成这一目标，我们需要在国际上获得举足轻重的地位。我们的势力圈需要达到#variable [ROOT.GetCountry.MakeScope.Var('shijie_GDP').GetValue|0]#!的GDP（也就是全世界GDP总额的一半），目前我们的GDP为#variable [ROOT.GetCountry.MakeScope.Var('jituan_GDP').GetValue|0]#!，所有我们势力圈的国家以及我们的附庸都会被纳入考量。"
 challenge_world_rule:0 "受到新兴国家挑战"

 chongzhi_shijie_tt:0 "没有其他国家已经完成这一目标。"
 
