 je_china_gongchan_4: "农业革命"
 je_china_gongchan_4_reason: "中华大地数千年来，哺育了万千黎民。我们的先民勤恳地开垦土地、培育庄稼，养育了我们的世代子孙。但是靠山吃山靠水吃水的日子不能长久，每当天灾降临，中华大地就会化为炼狱，饥荒席卷大地，出现人相食的惨象。\n如今我们执掌天下，此等惨状绝不可再度发生，我们需要迅速改变整个中国的农业现状，推动农业技术的发展进步，一劳永逸地解决粮食问题。愿天下再无饥民，愿良田尽是满穗！"
 gc_nongye: "农村合作社"
 
 je_china_gongchan_5: "工业革命"
 je_china_gongchan_5_reason: "如今世界之道，在于工业。工业兴，则国家兴。为了使国家振兴，列名世界民族之林，我们必须将工业建设落实下来。如此，才能展现我国政府之于历代前朝的优越之处，从而体现革命革新之面貌！"
 gc_gongye: "工业突破"
 
 je_china_gongchan_6: "政府革命"
 je_china_gongchan_6_reason: "国家两千年以来之政府，皆为帝王门阀之政府。数千年以来之官员，皆为列侯士绅之官员。而当今之政府，当为人民掌权之政府，当今之官员，当为为人民服务之官员。我们需要在政府内广泛地推行各项利民政策，兑现我们对人民的承诺！"
 gc_zhengfu: "为人民服务"
 
 je_china_gongchan_7: "大同社会"
 je_china_gongchan_7_reason: "大道之行也，天下为公。选贤与能，讲信修睦。故人不独亲其亲，不独子其子，使老有所终，壮有所用，幼有所长，矜、寡、孤、独、废疾者皆有所养，男有分，女有归。货恶其弃于地也，不必藏于己；力恶其不出于身也，不必为己。是故谋闭而不兴，盗窃乱贼而不作，故外户而不闭。是谓大同。"
