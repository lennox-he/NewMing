 je_jap_18_fail:0 ""
 
 jap_events.1.t:0 "军国主义的崛起"
 jap_events.1.d:0 "当今的世界，只有武力是唯一的语言，要想我国不落后于他人，只有悉心武备，征服四方，将全民投入到生存空间的争夺中去。"
 jap_events.1.f:0 "以军事组织的力量，作政权的重心，一切政 治的势力，都附从在军事势力之下，一切政治的组织，都附从在军国组织之下，必须这样，才能成为军国主义的国家"
 jap_events.1.a:0 "旭日舞刀！"
 jap_modifier_junguo:0 "皇国化"
 
 jap_events.2.t:0 "大正民主的遗产"
 jap_events.2.d:0 "民主的光辉正继续照亮着整个帝国！"
 jap_events.2.f:0 "我们在维新中学习到了新的思想和新的理念，在推行民主化进步思想的潮流中，我们认识到了权利的来源与国民的价值，只有坚定将民主思想遍及全国，我国才能才能真正做到以民为本，避免走上歧途！"
 jap_events.2.a:0 "拥抱民主！(线路未制作，等待更新)"
 jap_modifier_minzhu:"民主黎明"
 
 jap_events.3.t:0 "道路的抉择"
 jap_events.3.d:0 "幕府的阴霾已经褪去，摆在日本面前的是两条道路：还政于民，施行彻底的改革，让日本实现真正的民主化，还是学习西方列强，参与到瓜分世界的博弈中去？"
 jap_events.3.f:0 "如果我们继续在国内挑起军国主义，对外发动战争，国民就会倾向于走向军国主义道路，最终让我们彻底走向一条不归路。如果我们把视角放在国内，开化民智，不断进步的国民就会让我们走向民主化。"
 jap_events.3.a:0 "是时候前进了！"
 
 jap_events.4.t:0 "反日活动兴起"
 jap_events.4.d:0 "随着治安的松懈与恶化，[SCOPE.sState('kor_xiji_1').GetName]地区开始出现有组织的抵抗运动抵抗帝国的通知。"
 jap_events.4.f:0 "一份又一份的报告被特高课提交，很明显一支有组织的抵抗力量正在[SCOPE.sState('kor_xiji_1').GetName]形成，我们必须尽早应对，以免他们威胁我们的殖民地安全。"
 jap_events.4.a:0 "不过是弱者无谓的挣扎"
 
 jap_events.5.t:0 "反日分子袭击"
 jap_events.5.d:0 "今天，一支朝鲜的反日分子在帝国的[SCOPE.sState('kor_xiji_1').GetName]展开了恐怖袭击，他们的目的是抵抗帝国对朝鲜的统治。"
 jap_events.5.f:0 "随着帝国对朝鲜统治的深入，越来越多的朝鲜人开始抗拒这一切，一些激进分子在帝国四处开展恐怖活动。他们袭击警察局，破坏各种基础设施，骚扰我们的军队，但是这种不自量力的抵抗最终会被我们肃清。"
 jap_events.5.a:0 "螳臂挡车罢了"
 
 jap_events.6.t:0 ""
 jap_events.6.d:0 ""
 jap_events.6.f:0 ""
 jap_events.6.a:0 ""
 
 jap_events.7.t:0 "成功的行动"
 jap_events.7.d:0 "特高课的特工和当地警察配合，废除顺利地捣毁了当地的反日分子窝点。"
 jap_events.7.f:0 "“特高课”是日本的特务机构，也建立于19世纪末20世纪初。最初，特高科是一个应付国内事变的机构，但随着日本侵略中国和远东的需要，在被日军占领的中国各地的“日本领事馆警察署”内都设有一个“特高课”，负责侵华特务活动和谍报活动。"
 jap_events.7.a:0 "天闹黑卡板载！"
 jap_modifier_tgk:0 "特高课扫荡"
 
 jap_events.8.t:0 "功亏一篑"
 jap_events.8.d:0 "特高课的特工废了很大的精力来追捕当地的恐怖分子，但是这些反日分子躲过了搜查，让我们没能摧毁他们的核心根据地，尽管如此，我们依然破坏了他们大部分的活动网络。"
 jap_events.8.f:0 "“特高课”是日本的特务机构，也建立于19世纪末20世纪初。最初，特高科是一个应付国内事变的机构，但随着日本侵略中国和远东的需要，在被日军占领的中国各地的“日本领事馆警察署”内都设有一个“特高课”，负责侵华特务活动和谍报活动。"
 jap_events.8.a:0 "相关人员需要检讨！"
 
 jap_events.9.t:0 "彻底的失败"
 jap_events.9.d:0 "这帮抗日分子把我们耍得团团转，让我们要收网的时候，却发现我们的追查对象都是他们散布的诱饵，最终我们不但没有取得任何战果，反而自身损失惨重。"
 jap_events.9.f:0 "“特高课”是日本的特务机构，也建立于19世纪末20世纪初。最初，特高科是一个应付国内事变的机构，但随着日本侵略中国和远东的需要，在被日军占领的中国各地的“日本领事馆警察署”内都设有一个“特高课”，负责侵华特务活动和谍报活动。"
 jap_events.9.a:0 "主管人是谁？我要当他的介错人！"
 
 prosperity_greater_or_equal:0 "公司繁荣度大于"
 
 jap_events.10.t:0 "长州藩与萨摩藩"
 jap_events.10.d:0 "倒幕之战中，长州与萨摩都是出兵主力。然而两者素有间隙，在争夺军权上有着无比尖锐的矛盾。以至于常常到了水火不容的地步。"
 jap_events.10.f:0 "幕末时 日本 诸藩当中，以 萨摩藩 和 长州藩 最具政治上的影响力。 虽然当时双方都已经有武力讨伐幕府（讨幕）的打算，但因为西乡隆盛、 大久保利通 主导下的萨摩，曾于1864年的 禁门之变 中将长州势力逐出京都，并参与第一次长州征伐 (幕府与长州间的战争) ，故双方对彼此都怀有敌意。"
 jap_events.10.a:0 "兄弟阋墙"
 
 jap_events.11.t:0 "全面政变！"
 jap_events.11.d:0 "昔日的阴影如今已升级为赤裸裸、公开的街头暴力。由大阴谋引发的妄想症似乎终于爆发成了公开的 “关公战秦琼”--以弱胜强。军队现在公开不值得信任，越来越不服从命令，暴力在街头肆虐。甚至在我们自己的政府内部，也有关于阴谋腐朽的说法，我们的政府正在从里到外腐烂。如果不这样做，局势将明显恶化--后果将不堪设想。"
 jap_events.11.f:0 "今天是东京的又一天。大批工薪族、工厂工人、行人和平民走上街头，就像被风轻轻吹向目的地的尘埃。今天，市内轨道交通准时运行，顺利抵达所有站点，安全快捷地运送着人们。从皇宫看去，今天似乎很美好，甚至是田园诗般的美好。 成群结队穿着制服的人从横须贺的海军基地出发。他们的目的地是皇宫 文官政府已经辜负了日本人民的期望 现在就靠她在军队中的儿子们 来拯救她的末日了 他们是旁观者眼中的奇观；他们全副武装，身着卡其色制服，走在大街上，途中遇到的一切都尽收眼底。从埼玉县出发，军队开始了自己的行动。法律和礼节是该死的；现在是下级从下面、从结构之外进行统治的时候了。如果拯救日本所需要的仅仅是一些违反规则的行为，那么他们每次都会这么做。这些相互冲突的力量就像海浪拍打着墙壁一样迎面而来；在日本中部，他们相遇了。他们解下步枪，对准对方，但拒绝开火，他们将驻守首都的建筑，维持着不稳定的平衡。惊慌失措的国会调动了近卫第一师，命令他们保卫国会大厦和皇宫。"
 jap_events.11.a:0 "内战爆发了！"
 
