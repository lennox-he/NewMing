 xinying_yimin_3_de:0 "吸引明朝移民"
 xinying_yimin_3_de_desc:0 "大明人口众多，我们可以吸引一些没有土地的本地居民前往新大陆开拓殖民地。"
 
 xinying_yimin_4_de:0 "研发殖民技术"
 xinying_yimin_4_de_desc:0 "在新世界遇到的困难远比我们想得要多，为了解决瘴气的困扰，我们可以请求大明协助研究。"
 
 xinying_yimin_5_de:0 "请求财政拨款"
 xinying_yimin_5_de_desc:0 "我们的财政已经捉襟见肘，一笔来自大明的拨款可以为我们雪中送炭！"
 
 xinying_yimin_6_de:0 "开垦更多土地"
 xinying_yimin_6_de_desc:0 "我们殖民地的潜力还有待开发，我们可以扩张可耕作土地来容纳更多人口。"
 
 xinying_yimin_7_de:0 "宣称更多领土"
 xinying_yimin_7_de_desc:0 "普天之下莫非王土，率土之滨莫非王臣。所有与我们相邻的殖民区域都应该属于我们的管辖。"
 
 xinying_yimin_8_de:0 "请求行政援助"
 xinying_yimin_8_de_desc:0 "行政机构的扩张让我们的官员捉襟见肘，我们应该向大明求助，获取一批文员帮我们处理内务。"
 
 xinying_yimin_9_de:0 "请求外交援助"
 xinying_yimin_9_de_desc:0 "外交部门的扩张让我们的官员捉襟见肘，我们应该向大明求助，获取一批文员帮我们处理外务。"
 
 xinying_yimin_10_de:0 "请求天兵救援"
 xinying_yimin_10_de_desc:0 "对外战争让我国独木难支，我们可以向大明求助，帮我们击败外敌。"
 
 xinying_yimin_11_de:0 "请求教育援助"
 xinying_yimin_11_de_desc:0 "我国对于教育的需求空前膨胀，让大明调拨一些教师和学校资源会是一个不错的选择。"
 
 xinying_yimin_12_de:0 "请求军事援助"
 xinying_yimin_12_de_desc:0 "我国军队需要整顿，如果能得到大明的帮助，就能迅速提升我国军事实力。"
 
 xinying_yimin_13_de:0 "请求建设援助"
 xinying_yimin_13_de_desc:0 "我国的建筑部门难以满足需求，向大明请求一批工匠援助能解决我们的燃眉之急。"

 xinying_yimin_14_de:0 "向朝廷进贡"
 xinying_yimin_14_de_desc:0 "是时候展现我们的忠诚了，我们将向大明朝贡，赢取大明的信赖。"
 
 xinying_yimin_15_de:0 "宣布从大明独立"
 xinying_yimin_15_de_desc:0 "人生而自由，却无时不处于枷锁之中。"
 
