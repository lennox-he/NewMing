 scripted_button_key_guofangbu4:0 "整顿土地"
 scripted_button_key_guofangbu4_desc:0 "这片土地曾经被军阀控制，现在我们需要重新登记管理这里。"
 
 xixue_events.1.t:0 "西方学者来访"
 xixue_events.1.d:0 "一位来自[SCOPE.sCountry('xuezhe_xixue').GetName]的西方学者来到我国，为我们带来了一些有用的知识和一些西方国家特有的精巧机械。 "
 xixue_events.1.f:0 "他带着精妙的钟表，他带着详尽的万年历，他带着让诸位大臣都惊叹的知识，为朝堂带来了西方的奇迹！"
 xixue_events.1.a:0 "真是有趣"
 
 xixue_events.2.t:0 "传教士来朝"
 xixue_events.2.d:0 "一位来自[SCOPE.sCountry('xuezhe_xixue').GetName]的传教士来到我国，希望在[SCOPE.sState('xili_sheng').GetName]建立一座教堂，为中国的百姓传播福音，也许我们可以利用这一点，但是放任异教的传播并不是一件好事。"
 xixue_events.2.f:0 "神阿，你是我的神，我要切切地寻求你。在干旱疲乏无水之地，我渴想你，我的心切慕你。\n我若心里注重罪孽，主必不听。 但神实在听见了。他侧耳听了我祷告的声音。"
 xixue_events.2.a:0 "把这个异教徒赶走！"
 xixue_events.2.b:0 "我们确实需要他！"
 
 xixue_events.3.t:0 "西方技术传入"
 xixue_events.3.d:0 "一项西方科技正传入我国，我们应该抓住这个机会，大力学习！"
 xixue_events.3.f:0 "夫西洋之长技，在于军舰、器械、哲学，欲制衡众夷，必师夷长技以制夷。"
 xixue_events.3.a:0 "立刻推广！"
 xixue_events.3.b:0 "不要操之过急！"
 
 xixue_events.4.t:0 "民众抵制基督教"
 xixue_events.4.d:0 "我国省内出现的基督教传播引发了大批民众的抵制，他们难以接受这种怪异的宗教和诡异的教堂在身边传播。"
 xixue_events.4.f:0 "大家听我说，这西洋教绝非善类，他们是打着传播福音的幌子敛财，远渡重洋为的是侵略扩张，我们要让着洋教滚出中国的土地！"
 xixue_events.4.a:0 "基督教确实应该被限制"
 xixue_events.4.b:0 "这帮愚民懂什么？"
 
 xixue_events.5.t:0 "大臣改信基督教"
 xixue_events.5.d:0 "一位我国的大臣最近改信了基督教并接受了洗礼。"
 xixue_events.5.f:0 "你承认人人都有罪，罪的工价就是死。耶稣是全人类唯一的救主，只有耶稣能救所有的罪人，你愿意接受耶稣作你个人生命的救主吗？\n你承认圣灵在你生命中的主权，是圣灵光照你、引导你、感动你，接受耶稣做你的救主，你愿意在受洗以后，要跟着圣灵的引导，走遵行神旨意的道路吗？\n你承认圣经是神所默示的话语，是每一个基督徒包括你我行事为人的准则，你愿意受洗以后，多看圣经，喜爱圣经，遵行圣经的教导吗？"
 xixue_events.5.a:0 "这是离经叛道！"
 xixue_events.5.b:0 "这是他的自由。"
 
 xixue_events.6.t:0 "儒学与西学"
 xixue_events.6.d:0 "随着西学传入我国，儒学大家和西方学问开始针锋相对，他们四处开展辩论，都想证明自己才是最好的治国学说。"
 xixue_events.6.f:0 "“一个真正的中国人可以同时拥有成年人的头脑以及孩童的心灵，故此，中国人精神便是一种让青春得以永葆、民族得以不朽的精神。”"
 xixue_events.6.a:0 "儒学才是治国之本"
 xixue_events.6.b:0 "西学才是强国之道"
 
 xixue_events.7.t:0 "西式学院"
 xixue_events.7.d:0 "一间新式学院在某省建立，他们教授西方的科学，而非儒家的仁义道德。这种新式学校给了我们全新的见闻。"
 xixue_events.7.f:0 "赫胥黎独处一室之中，在英伦之南，背山而面野，槛外诸境，历历如在几下。乃悬想二千年前，当罗马大将恺彻未到时，此间有何景物。计惟有天造草昧，人功未施，其借征人境者，不过几处荒坟，散见坡陀起伏间，而灌木丛林，蒙茸山麓，未经删治如今日者，则无疑也。怒生之草，交加之藤，势如争长相雄。各据一抔壤土，夏与畏日争，冬与严霜争，四时之内，飘风怒吹，或西发西洋，或东起北海，旁午交扇，无时而息。上有鸟兽之践啄，下有蚁蝝之齧伤，憔悴孤虚，旋生旋灭，菀枯顷刻，莫可究详。是离离者亦各尽天能，以自存种族而已。数亩之内，战事炽然。强者后亡，弱者先绝。年年岁岁，偏有留遗。未知始自何年，更不知止于何代。苟人事不施于其间，则莽莽榛榛，长此互相吞并，混逐蔓延而已，而诘之者谁耶？"
 xixue_events.7.a:0 "支持他们的行为"
 xixue_events.7.b:0 "我们不能容忍他们的行为"
 
 banner_events.1.t:0 "八旗攫取权力"
 banner_events.1.d:0 "作为以满洲人为主要居民的我国，八旗制度一直是我国的一项政治军事与经济组织。从游牧时期开始，八旗就作为一股重要的政治力量左右我国的局势。"
 banner_events.1.f:0 "八旗开始掌权"
 banner_events.1.a:0 "八旗是我们的基础"
 
