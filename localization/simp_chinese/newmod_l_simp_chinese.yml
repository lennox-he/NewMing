 CNF_duhu_desc: "拂菻国，一名大秦，在西海之上，东南与波斯接。 地方万余里，列城四百，邑居连属。 其宫宇柱栊，多以水精琉璃为之。---《通典》"

 CNB_duhu: "成立波斯都护府"
 CNB_duhu_desc: "龙朔初，又诉为大食所侵，是时天子方遣使者到西域分置州县，以疾陵城为波斯都督府，即拜卑路斯为都督。---《新唐书》"

 CNS_duhu: "成立北海都护府"
 CNS_duhu_desc: "北海虽赊，扶摇可接；东隅已逝，桑榆非晚。---《滕王阁序》"

 CNR_duhu: "成立罗刹都护府"
 CNR_duhu_desc: "问其何贫，曰：“我国所重，不在文章，而在形貌。其美之极者，为上卿；次任民社；下焉者，亦邀贵人宠，故得鼎烹以养妻子。若我辈初生时，父母皆以为不祥，往往置弃之，其不忍遽弃者，皆为宗嗣耳。”问：“此名何国？”曰：“大罗刹国。都城在北去三十里。”马请导往一观。于是鸡鸣而兴，引与俱去。---《罗刹海市》"

 CNA_duhu: "成立天方都护府"
 CNA_duhu_desc: "天方，古筠冲地，一名天堂，又曰默伽。不道自忽鲁谟斯四十日始至，自古里西南行，三月始至。其贡使多从陆道入嘉峪关---《明史·西域传》"

 CNI_duhu: "成立天竺都护府"
 CNI_duhu_desc: "“身毒之国，轩辕氏居之。郭注，天竺国也。”--《山海经》"

 CNX_duhu: "成立邪马尼都护府"
 CNX_duhu_desc: "邪马尼，居欧洲中原，同盟三十六国，而中惟布路斯最强。---《史稿》"
 
 tianming.24.t: "成立泰西都护府"
 tianming.24.d: "在征服了极西之地以后，我们决定在此地成立都护府，以便管理、教化此地的西洋人。当地人虽不通教化，然亦非蛮貊之人，楼阁亭台、诗歌戏剧，亦有其客观者。然欲使其归化，恐须良日。"
 tianming.24.f: "泰西距中原两万里有余，昼夜相反。西临大洋，气候温润。"
 tianming.24.a: "好的"

 tianming.25.t: "成立拂菻都护府"
 tianming.25.d: "拂菻者，乡大秦国也，后亦称鲁密。其国传祚数十代，计千年余，终为突厥所覆。今吾国兵锋临此，所以复其宫室宗庙，以飨其先祖，安其黎庶。千年之国，终朝于明。"
 tianming.25.f: "大秦其王无有常人，皆简立贤者。国中灾异及风雨不时，辄废而更立，受放者甘黜不怨。其人民皆长大平正，有类中国，故谓之大秦……"
 tianming.25.a: "好的"

 tianming.26.t: "成立波斯都护府"
 tianming.26.d: "波斯，旧安息国也，汉唐皆曾使之。成祖时，帖木儿欲以安息之兵征中国，未及，卒，成祖数下南洋以求共御之。今我军至此，始夙旧愿。"
 tianming.26.f: "“帖木儿，僻处西域，乘国中无主，僭称可汗，控弦之士数十万，屡犯邻境。”"
 tianming.26.a: "好的"

 tianming.27.t: "成立邪马尼都护府"
 tianming.27.d: "邪马台，亦作日耳曼，地处西洲之中原，森林广布，邦国众多，本为一国，其帝战陨，诸侯各自崩析。今我军兵至，或可解其乱局，平其纷争，统合诸邦，永缔宁和。"
 tianming.27.f: "邪马尼，居欧洲中原，同盟三十六国，而中惟布路斯最强。"
 tianming.27.a: "好的"

 tianming.28.t: "成立北海都护府"
 tianming.28.d: "北海地近北极，其民剽悍好斗，每乘舟持斧而南寇，莫有能敌者。善舟楫，能逆浪而驰，恶名扬于西洲。皆以战死为荣，以寿死为耻。今吾临之，可教化其民，使其为我所用。"
 tianming.28.f: "穷发之北，有冥海者，天池也。有鱼焉，其广数千里，未有知其修者，其名为鲲。有鸟焉，其名为鹏。背若泰山，翼若垂天之云。"
 tianming.28.a: "好的"

 tianming.29.t: "成立罗刹都护府"
 tianming.29.d: "罗刹国，故为大帐汗国之辖区，为元廷之臣属。而后雄主一统、尽逐鞑靼，挥师东进，寇边中华。今我军复临元师征伐之地，故地重游，他日之风景，或为不同焉。"
 tianming.29.f: "俄罗斯，地跨亚细亚、欧罗巴两洲北境。初由东洋海岸收毳矿之贡，抵黑龙江北岸，据雅克萨、尼布楚二地，树木城居之，侵扰诸部。嗣又越兴安岭南向，侵掠布拉特乌梁海四佐领。崇祯十二年，建奴征黑龙江，毁其城，兵退而罗刹复城之。"
 tianming.29.a: "好的"

 tianming.30.t: "成立天方都护府"
 tianming.30.d: "地多旷漠，即古筠冲之地，名为西域。风景融和，四时皆春也。田沃稻饶，居民安业，风俗好善。有酋长，无科扰于民，刑法之治，自然淳化。不生盗贼，上下和美。古置礼拜寺，见月初生，其酋长及民下悉皆拜天，以为一国之化，余无所施。其寺分为四方，每方九十间，共三百六十间。皆白玉为柱，黄甘玉为地，中有黑石一片，方丈余，曰汉初天降也。其寺层次高上，如塔之状。男子穿白长衫。地产金珀、宝石、珍珠、狮子、骆驼、祖剌法、豹、麂。马八尺之高也，即为天马也。货用金银、段疋、色绢、青花白磁器、铁鼎、铁铫之属。乃日中不市，至日落之后以为夜市，盖其日色热之故也。"
 tianming.30.f: "罕见天方国，遗风礼义长。\n存心恭后土，加额感穹苍。\n玉殿临西域，山城接大荒。\n真珠光彩洁，异兽贵驯良。\n日以安民业，晚来聚市商。\n景融禾稼盛，物阜草木香。\n尤念苍生志，承恩览远邦。\n采诗虽句俗，诚意献君王。"
 tianming.20.a: "好的"

 tianming.31.t: "成立天竺都护府"
 tianming.31.d: "天竺者，玄奘玄策所游之地也，向曰身毒，在西藏之西，灵山之南，古传之西天之地。陆路海路皆可通之。---《大明万国舆图》"
 tianming.31.f: "“夫天竺之称，异议纠纷，旧称身笃，身毒，贤豆，天竺等。今从正音，宜云印度”。"
 tianming.31.a: "好的"

 JIANLI_YINGZHOU_XUANWEISI: "成立瀛洲宣慰司"
 JIANLI_YINGZHOU_XUANWEISI_desc: "“海客谈瀛洲，烟涛微茫信难求；越人语天姥，云霞明灭或可睹。”---《梦游天姥吟留别》"
 tianming.32.t: "成立瀛洲宣慰司"
 tianming.32.d: "瀛洲，旧倭国也，唐时朝于廷，广受教化。然野性未改，性烈好斗，士人戮民以为乐，谓其试刀。元祖尝渡海征之，再征不可。本朝初，倭兵寇海，为祸乡野，海民畏而避之。太祖遣使以求约束，不得返。世宗时，倭乱甚猖，浙闽边民受戮者不计，后得元敬、志辅御之。神宗时，寇朝鲜，大兵驱之，神宗欲水师征之，未几，战时毕，不得行。今神州得幸，倭患得终，大兵已至，宇内"
 tianming.32.f: "“海客谈瀛洲，烟涛微茫信难求；越人语天姥，云霞明灭或可睹。”---《梦游天姥吟留别》"
 tianming.32.a: "好的"

 CHI_FLAVOR_TEXT:1 "在面对郑成功激烈的反攻时，清朝的统治者选择了撤回关外。现在明朝已经重新复兴，大清是否还有机会重现两百年前萨尔浒之战的荣光，重新入主中原？"

 TIB_FLAVOR_TEXT:0 "西藏在过去的五百年都向明朝中央朝贡请求册封，但是有幸能游离在中国政府的直接管辖之外，这样的时光还能持续下去吗？亦或者被中国政府的全新战略所取代，彻底融入中华帝国中去？"
 
 RYU_FLAVOR_TEXT:0 "作为一个小国，琉球并没有太多的选择，这个夹在中国和日本之间的国家，并没有独立自主的能力。自三山统一以来的几百年里，琉球都是明朝的朝贡国，但是统一的日本逐渐对琉球人虎视眈眈，琉球能在这个时代从日本的侵略种幸存吗？"
 
 CNN_FLAVOR_TEXT:0 "在一百年前的[concept_annan_war]中，明帝国仿照永乐大帝的做法，用大军荡平了越南北部的抵抗者，并且将南方的南朝的大越纳为朝贡。越南的局势一直动荡不安，但是在明帝国强大的军力威慑下，安南宣慰司依然保持着稳定的发展。如今，皇帝的亲弟弟，大明安南亲王朱伯洵被分封到这片大明的新边疆。安南的未来将会走向何处？"
 
 CNP_FLAVOR_TEXT:0 "吕宋宣慰司的建立要归功于朱成功将军，在万历末年和崇祯末年，在吕宋岛的西班牙人两次对当地的华人居民举起屠刀，在收复了台湾后，朱成功将军整顿军队，出乎意料地出现在了马尼拉城下。溃不成军的西班牙人不得不放弃了吕宋的殖民地。吕宋曾作为郑明反攻大陆的基地，在光复南京以后，这里的郑军撤离，明帝国将这里设为了宣慰司辖区，派遣官员治理。吕宋是大明对外贸易的重要中转站，这里一片祥和，应该不会发生什么大事，我是说应该。"

 CNM_FLAVOR_TEXT:0 "大明危在旦夕的时候，国姓爷朱成功挺身而出，他的后代在长达几十年的战争中夺回了大明的江山，平定了妄图自立的三藩，将大清的统治限制在燕云十六州和长城以北的荒漠。我们又享受了百年的盛世，但是随着西洋人的扩张，朝廷的腐化，以及虎视眈眈的关外，我们是否还有机会完成收复燕云，统一中国的鸿图？"
 
 CNL_FLAVOR_TEXT:0 "为了寻找佛朗基人所说的银矿，我们的先祖远渡重洋来到了这片陌生的大陆，经过劳动与开垦，我们建立起了这片家园，并最终与中原王国决裂，成立了自己的共和政府。然而，虎视眈眈的西方人正在威胁我们的存在，我们需要迅速的发展壮大，才能对抗西洋帝国的威胁，抑或是，向巨龙求助？"
 
 ming_tax_head:0 "人头税"
 ming_tax_head_desc:0 "几千年来，人头税都是中国的重要税收项目，通过户籍统计出人口的总数，再按照人丁数量计算出每人应当缴纳的税额。这是帝国稳定运行的基石。然而这种税收制度也绝非万能，藏匿人口的情况时有发生，这种制度也大大遏制了我国民众的生育欲望，毕竟多一个人就要多一份税收。"
 
 ming_zheng_navy:0 "郑氏海军"
 ming_zheng_navy_desc:0 "作为反清复明的功臣，郑氏家族获得了及其崇高的地位。郑氏海军就是大明水师的全部，他们拥有着最庞大的军权和政府话语权，而皇帝不得不将他们的意见放在心上。"
 
 ming_warlord:0 "藩镇林立"
 ming_warlord_desc:0 "在抵抗清军的战争中，我们对所有能够施以援手的势力都许诺了好处，而回报就是在一京十三省中林立的如同独立王国一般的大小军阀。其中李定国后代在西南的云南王，前顺军册封的关中营是其中最不可小觑的势力。"
 
