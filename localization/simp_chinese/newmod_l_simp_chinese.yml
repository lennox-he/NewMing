 ming_events.36.t: "帝制的终结"
 ming_events.36.d: "两千年的帝制中国，随着最后一位朱家皇帝被送出紫禁城而走到尽头。如今，[ROOT.GetCountry.GetName]正处于历史的转折点，我们必须对自己进行全新的审视！"
 ming_events.36.f: "“我们已经找到新路，我们能跳出这周期率。这条新路，就是民主。只有让人民来监督政府，政府才不敢松懈。只有人人起来负责，才不会人亡政息。”"
 ming_events.36.a: "“#YELLOW 大明#!”这个称呼已经延续了五百年之久，他还会继续作为我们的国名延续下去！"
 ming_events.36.b: "是时候彻底铲除朱明王朝给神州大地的枷锁了！"
 ming_events.36.c: "中国！在过去、现在和未来，都只有这一个称呼！"

