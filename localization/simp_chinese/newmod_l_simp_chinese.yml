 law_state_religion_sanjiao: "三教合一"
 law_state_religion_sanjiao_desc:0 "我国并非单一的宗教国家，而是包容并蓄的自由信仰国家，虽然我们有名义上的国教，但是儒释道都是被视为于国教同等地位的教派。同时我国的宗教被认为是一种生活方式而不是意识形态，即使是异教徒，也能得到很大程度的宽容和理解。"
 
