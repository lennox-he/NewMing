 concept_zhongwuwang:0 "忠武王"
 concept_zhongwuwang_desc:0 "忠武王本名郑森，后受隆武帝赐姓，改名朱成功。朱成功在朝廷危亡之际，拓土海外，收复台湾、吕宋。后来清廷因为继承危机发生内乱，鳌拜拒绝承认康熙是顺治皇帝的子嗣并发兵叛乱试图废除康熙。忠武王趁机发动北伐，成功收复南方，并在[concept_zhaowu]元年（西元1668年），在徽州找到了隐姓埋名的永王朱慈炤。永王在南京登基后建元[concept_zhaowu]。之后朱成功在多次战争中逐步收复了中原，并统合了关中、西川的抗清队伍。基本恢复了收复了关内的领土。但在五次北伐幽燕的时候屡屡受挫，无缘看到山河统一。他在明廷的头衔是奉天翊运推诚宣力定难延平亲王、总摄朝政督师北伐总理中外军国重事、总督东南诸省兼理吕宋抚夷钦差、提督汉番水陆诸军招讨大将军、宗人府宗人令、领南京中军都督府事臣。详见[concept_zhongwuwang_story]"

 concept_zhongwuwang_story:0 "《明史：忠武王世家》"
 concept_zhongwuwang_story_desc:0 "郑森，字大木，福建南安人。父芝龙，闽海豪酋；母田川氏，东瀛人也。森少聪颖，隆武帝见而奇之，赐国姓“朱”，改名成功，授御营中军都督。未几，芝龙降清，成功泣谏曰：“父教子忠，奈何自叛？”遂焚青衣于孔庙，誓曰：“此身许国，敢有二心！”。\n永历十三年，会张煌言舟师北伐，破瓜洲，克镇江，直薄金陵。江南父老箪食壶浆，谓中兴在望。然清廷伪示援绝，守将梁化凤穴城夜袭，王师溃于观音山。成功慨然曰：“岂天未厌胡运乎？”退守厦门。十五年，复振旗鼓，亲率舟师二万、舰三百攻台。红夷炮垒如星，诸将惧，成功叱曰：“赤嵌城头，岂无汉骨耶？”卒克热兰遮，夷酋揆一泣降。然闻清廷戮其父芝龙，呕血数升，誓曰：“不犁燕庭，此恨不销！”\n十六年，征吕宋。时西夷虐华，血洗涧内，成功遣责问，夷拒而辱之，遂发兵夷其堡。吕宋既下，得银舰无算，乃置甲必丹营，汉番混编。及返，闻帝崩于昆明，大嚎西拜，数日不进饮食。而后贼酋福临没于壮年，燕廷为乱。成功厉兵数年，始得良机，随挥师渡海，百姓无不箪食壶浆，虏伥望风而降，王师遂入金陵。\n昭武元年，奉永王慈炤返跸金陵，甲申板荡，永王流落中原，几经反折，之于江南，时弘历覆，帝隐于徽州，王师至，乃前呈身世。帝倚为柱石，拜辅政亲王，总摄五军。各地诸侯起兵应之，李来亨部入关中，于辅臣合兵，克西安，据武、潼以拒虏，可望出于川蜀，伪总督困于无援，不能敌，于是燕庭颓势。三藩遂自立，成功以鸟船驰袭番禺，连破之，三桂死而大仇报。又北伐中原，以铁人军、吕宋手炮营为引，虏军畏却之，莫与之敌，开封既克，西路诸藩遂朝于廷，得封敕。\n昭武五年始，五伐幽燕。初，破德州，克天津，焚通州，虏师不敌。八年，出正定，围燕京。朝中谗言，无功辄返。十年，清虏寇保定，成功率军据之，贼溃，成功轻敌逐之，中伏于拒马河，王师几殁，虏骑逐至济水，辎重尽丧，伏尸千里。王请致仕，帝不许。十三年，集宣大、顺营出宣化，王师出廊坊，数败虏军，再临京师，寇得英夷之佛朗基炮，镇之九门，不得克，乃返。忠武王数临旧京，八旗震怖，贼酋东迁。然清虏依坚城之险，上下死战，终不克。昭武十五年，会战燕郊，明军势盛，虏军固守不敢出。然成功旅途劳顿，久感风寒，扶辕欲视故都，雾浓不得见，成功怆然涕泪，不复言，次日，奉天翊运推诚宣力定难延平亲王、总摄朝政督师北伐总理中外军国重事、总督东南诸省兼理吕宋抚夷钦差、提督汉番水陆诸军招讨大将军、宗人府宗人令、领南京中军都督府事臣--成功,薨于白沟河驿，年六十。六军秘不发丧，白布缠臂，星夜归于真定。帝闻之，悲绝挽之，追忠武王。\n史官曰：\n成功以海寇之资，怀孤忠之志。台澎开基，吕宋雪耻，五叩燕关，气吞海岳，虽武侯北伐未若此勤也！然天不假年，雾失蓟门，岂非命耶？忠武绝而后世继，烈士陨而山河存。至若诸镇坐大，实因后继者无王之人望——昔者诸侯畏其威而效命，后则轻其子而萌异。悲夫！"

 concept_zhaowu:0 "昭武"
 concept_zhaowu_desc:0 "昭武皇帝朱慈炤的年号，朱慈炤为明思宗与田贵妃所生之子，于崇祯六年（1633年）六月二十一日出生， 崇祯十五年（1642年）三月二十一日被封为永王。崇祯十六年（1643年）八月出阁讲学。他与三兄定王朱慈炯都“眉宇并天人，诵书清圆，作字端楷。讲罢，呼：‘先生每吃茶！’音如玉”。\n崇祯十七年（1644年）明思宗自缢之前，将太子朱慈烺与定王朱慈炯、永王朱慈炤一起送出宫，但不久就被送他们出宫的太监交给李自成。不久，李自成兵败山海关，三兄弟都下落不明。朱慈炤一路向南逃亡，在安徽南部隐居，一直到1668年，郑明军队克复南京以后进军徽州，才现身与郑明官方取得联系。朱成功对此非常重视，亲自前往徽州迎接朱慈炤，并扶持其登基称帝。\n但昭武登基以后几乎没有实权，而是把朝政全部委托给了[concept_zhongwuwang]，朱成功主导了五次北伐军事行动，最终在[concept_zhaowu]十五年的最后一次北伐中去世。但这之后，[concept_zhongwuwang]的后代郑经继续把持朝政，由于军队几乎全部听令于郑家，所以昭武帝始终没有真正实权亲政的经历。更多的时候类似于郑氏在外出征时的监国。[concept_zhaowu]三十六年，崩，尊谥烈祖威皇帝，其子朱和垣继位，是为文祯帝"

 
 concept_wenzhen:0 "文祯"
 concept_wenzhen_desc:0 "文祯皇帝朱和垣的年号，朱和垣是明烈宗[concept_zhaowu]皇帝和孝端皇后周氏的长子，性格宽和稳重。文祯皇帝刚登基时，为了缓解原本为[concept_zhongwuwang]设立的各路义军藩镇和中央的矛盾，不得不允许藩镇获得当地的税收权利，这为日后藩镇做大埋下了隐患。文祯初年大明与荷兰在南海发生冲突，荷兰人常常截杀中国商船，为了探寻新的商道，郑经派舰队先向东行驶再向南，试图绕过荷兰人的控制区。并无意发现了远南大陆，并在[concept_wenzhen]十五年于此设置了[concept_xuanweisi_china]。文祯皇帝新政期间，引进高产水稻，发展江南经济，之后又发行新钞可惜以失败告终。[concept_wenzhen]十九年，乌斯藏的达赖朝贡于南京，皇帝设立都司进行管辖。文祯二十年，因为宝钞通胀严重，皇帝听从海商的传闻，下令招募流民前往新大陆开采金银矿产弥补纸钞流产的损失。到三十二年，黎洲地方人口渐盛，于是设立了黎洲[concept_xuanweisi_china]。文祯皇帝在位期间中原和江南的经济得到了一定的恢复。[concept_wenzhen]四十三年，朱和垣驾崩，谥号文襄。其子朱怡钺登基，是为[concept_jingsu]帝。详见[concept_wenzhen_story]"

 concept_wenzhen_story:0 "《明史：文襄宗本纪》"
 concept_wenzhen_story_desc:0 "文祯皇帝讳和垣，[concept_zhaowu]帝长子也，母孝端皇后周氏。帝生而隆准，性宽仁，好释典。[concept_zhaowu]三十六年春正月，昭武帝崩，尊谥烈祖威皇帝，太子即皇帝位，改元[concept_wenzhen]，颁诏大赦。[concept_wenzhen]元年，帝苦藩镇支用无度，每每以备夷看边为名索饷，每不予，则劝之以崇祯故事，帑库空虚，帝不能已，召诸藩督师入觐，颁《武臣敕谕》于午门“凡千户以下，许尔自除；岁饷毋逾赋十一。敢私盟、越境、截士子者，天下共击之！”，遂解藩饷之苦，且藩镇取于封所，财源得限，不得无度扩编，然藩镇自此，人事、财源皆以自取，自是渐离朝廷。此祸始也。\n文帝初，延平王郑经摄政，与红毛夷隙于南海，夷据旧港，锁三佛齐，华商不得通。为拓商道，避夷船而南向，忽至新陆，未见于舆图，谓之远南。遂登陆设埠，始通商，后以此建城，谓之远南城，设昆阳省。至拓新城，名之郑启。东拓天恩省，都于澳阳。后闽客多迁于此，十五年，帝设远南[concept_xuanweisi_china]治之。\n文祯四年，郑经薨，帝以爵利抚之后裔，收权亲政。“郑氏子弟，爵禄如故，军政勿预。”\n帝悯民力，引吕宋稻种，苏胡增产无数，江南殷实。帝遂推行新钞，曰文祯宝钞，然无金银为依，豪强拒纳，商贾折价三成，十年乃废。\n十九年，达赖入朝，请设都司，帝允之，设庙安抚，令川云征民夫修驿站以通之，四川巡抚兼察康藏，后转设专职驻藏大臣，赐金印，驻军三千，兵于昌都。\n文祯二十年，新钞既废，帝恼之，忽问海商曰，东去重洋，其土广富金矿。帝悦之，乃诏流民东迁，人赐铳一、粟三斛，三载不税。流民掘金于河谷，岁得粗银数十万两，野邑渐成。文祯三十二年，黎洲流民拓地千里，金山汉街栉比，帝始设[concept_xuanweisi_china]，都于坤宇，命进士王守忠为都护使，岁赋输银百万。帝好文治，多修水利，通商埠。甲申以来，江南中原屡经战火，民生困苦，文帝之治，繁荣愈胜昔日。文祯四十三年，帝崩于乾清宫，年七十四。\n史官曰：\n文帝以柔克刚，解藩饷之困，开远南之疆，江南粟溢，黎洲银涌，可谓善守成矣！然察其政：《武臣敕》下，而藩镇异心、边军自足，此谓养虎贻患；宝钞既行，而豪强拒纳、税吏剖金，斯曰恤民失道。昔汉元帝委政于石显，唐文宗受制于仇宦，文帝虽无阉祸，而藩镇之弊更烈焉！谚云“宽仁生乱”，岂不信哉？"

 concept_jingsu:0 "靖溯"
 concept_jingsu_desc:0 "靖溯帝朱怡钺的年号，朱怡钺是明文宗[concept_wenzhen]皇帝的第七子，母亲是孝静皇后吴氏，朱怡钺年少就喜欢骑射武艺而不好读书。对于[concept_zhaowu]年间的五次北伐总是耿耿于怀。即位以后先是在[concept_jingsu]五年西征准噶尔，在天山勒石，并收复了关西七卫。并在之后平定了西南土司的叛乱，又因为保护兰芳于荷兰发生冲突，焚毁满剌加城，东南亚各国此后重新朝贡于大明。[concept_jingsu]二十三年，皇帝认为四海已经平定，只剩燕云还未收复，于是调集京营和藩镇共同北伐。但是装备了英国援助的加农炮的清军伏击了明军，导致后者损失惨重。为了在有生之年再度凑出军队北伐，[concept_jingsu]皇帝加重了各地的税赋，并增收黎洲矿税三成以及加征丝绸税。第二年黎洲抗税运动愈演愈烈，最终发生了[concept_silkwar]，黎洲人驱逐了大明的官吏，靖朔皇帝大怒，本想造船东征，却因国库空虚作罢。[concept_jingsu]五十七年安南内乱，阮福映弑主自立，僭称“大南皇帝”。朝廷因此兴兵讨伐，成功攻占越南北部，并设立了安南[concept_buzhengsi_china]，但因为强推律令激起多次不满，最终册封其子朱伯洵为安南亲王，设立为[concept_fanwang_china]。[concept_jingsu]六十四年，驾崩，谥号桓皇帝。详见[concept_jingsu_story]"

 concept_jingsu_story:0 "《明史：圣桓帝本纪》"
 concept_jingsu_story_desc:0 "靖朔皇帝讳怡钺，文宗襄皇帝第七子也，母孝静皇后吴氏。帝隆准虬髯，膂力绝伦，尝御苑引三石弓，一矢贯双麂，侍臣惊呼“神射”。文宗四十三年冬，文宗崩，太子即皇帝位，改元靖朔。时五军都督府拥兵自固，帝登坛誓师：“昔烈祖五伐未竟之志，朕当提三尺剑酬之！”\n五年春，宣大都督马雄鸣献漠南骏马千匹，帝亲驰校场，蹄烟蔽日。忽勒马西指曰：“哈密故土，岂容准夷鼾睡？”遂点榆园锐卒八万，裹百日粮西征。师次酒泉，值大风雪，旌旗冻裂。帝解貂裘予士卒，夜持长槊立辕门，须眉尽冰。将士感泣，一鼓破哈密，兵至龟兹，准酋葛尔丹策零北遁。乃铸铁碑于天山，铭曰“圣武靖朔”。大兵返于玉门，帝大喜，诗曰：“朔气横雕弓，天山雪化甲。玉门沙似金，为我洗胡马。烽燧尽汉旌，驼铃鸣凯下。一箭定龟兹，何须班定远？遥望长安月，犹照烈祖剑。燕然石未勒，此身敢言倦！”设卫所抚之，乃班师。\n越三年，车里土司刀干孟结三十六峒作乱，焚腾越驿。帝命大西营督师李定国裔孙李嗣兴会京营讨之。嗣兴佯退诱敌，密遣象兵伏澜沧江谷。及叛酋渡半，巨象突践，俘斩三万。捷至，帝割犀带赐嗣兴曰：“卿不坠宁宇王英风！”由是土司具降，西南遂安。\n又五年，荷兰红夷焚兰芳，戮华商三百。帝震怒，召舟师提督陈泽于乾清宫，掷剑令曰：“不屠巴城，勿归见朕！”泽率巨舰百二十艘，乘月夜潮突袭满剌加。是役也，焚夷舰如炬，血染海峡。红夷缚酋献金乞和，帝笑纳其币，旋敕曰：“夷性犬羊，今断其爪牙可矣。”遂罢兵。琉球闻之，遣使献《洪武朝贡图》，东海诸岛复奉正朔。\n帝见西北绥靖、南洋宾服，遂决意北伐。二十三年秋，倾京营二十万出紫荆关，旌旗绵延四十里。初至涿州，八旗望“靖朔”纛辄溃。然帝轻敌，命轻骑逐北。至房山深谷，虏伏尽起，英制火炮裂崖石，神机营铳械尽没。溃兵争渡拒马河，溺毙相枕。帝单骑走脱，夜宿农家，割发置案曰：“朕负烈祖矣！”天明收残卒六万，退保济南。是谓“戊戌之溃”，明之精锐自此空。\n靖朔三十六年，为补军亏，诏增黎洲矿税三成。金山矿夫王三麻断指血书：“皮骨已枯槁，税吏犹剜心！”宣慰使呈之，帝掷书丹墀：“野氓安敢抗天子？”明年春，商船“安海号”泊金山港，税吏强征苏绸。青壮愤起，投火焚舶，锦灰蔽海三日，史称“焚丝之变”。明卒守黎洲者寡，多不恋战，及义军势起，多降之，及帝闻黎洲立国，帝目眦尽裂，叱令工部造十丈楼船百艘征之。户部尚书抱籍跪泣：“当今库银仅二十万两，尚欠宣大军饷，京营重建亦须巨资，而一舰需费六十万两！”帝仰天椎案：“朕不得为永乐乎？”掷斧斤于地。遂颁《锁洲令》：“片帆不得渡东溟！”\n五十七年，安南阮福映弑主自立，僭称“大南皇帝”。帝命宣大都督沐昌明帅师十万南征，六皇子伯洵监，南军战于富良江，安南象阵欲冲明军，昌明令火铳齐射，象惊反奔，踏阮军十里。大军围升龙，伯洵树《洪武赐印图》于阵前，呼：“黎氏旧臣降者免死！”，城门遂开，贼酋南遁。初置布政司，强推《明律》，禁土司祀雒龙君，致清化民变，交趾汹汹，既平，伯洵驰奏：“夷俗不可骤革。”。帝悟之，诏改宣慰司，封伯洵安南亲王，敕曰：“夷汉别俗，当顺其性。”亲绘《三抚图》赐之：一抚免丁税，二抚存祠庙，三抚通婚媾。\n六十四年，帝已病亟，犹指北舆图曰：“燕蓟……”语绝而崩，年七十九。是夕天雷碎孝陵石马，金陵童谣曰：“烈祖霹雳鞭，靖朔不得眠。”\n维[concept_chengan]元年，孝子嗣皇帝伯溱，谨奉金册上尊谥：圣宗奋武，桓震八荒。收交趾而铜柱立，定天山而胡马喑。然黎洲烟蔽海，燕蓙恨凝霜。谨循谥法，曰桓皇帝。伏惟圣灵，永鉴玄穹！\n史臣曰：\n帝以霸王之资，骋六合之志。西收哈密，南服交趾，东海波澄，何其雄也！然戊戌一蹶，弃甲如山；黎洲再乱，裂土海外。昔符坚投鞭断流，终败淝水；隋炀龙舟蔽江，卒殒江都。刚猛苛厉，虽暂震戎狄，终溃于萧墙。语曰“好战者亡”，靖朔之谓欤？"

 concept_chengan:0 "承安"
 concept_chengan_desc:0 "承安帝朱伯溱的年号，[concept_chengan]皇帝是在大明风雨飘摇的时候登基的，此时的大明经历了[concept_jingsu]北伐惨败，黎洲[concept_silkwar]和[concept_annan_war]，国库空虚、军力羸弱，军阀还有做大、割据的风险。承安皇帝不得不休养生息，把精力放到稳定国内局势和恢复经济上。但最终，承安皇帝的目标不仅仅是维持明朝马车的平稳，他真正想要的是，平定燕云和辽东、废除士绅的优待地位并平定地方藩镇。由于感觉自己时日不足以完成这些壮举，他把希望放在自己的继承人---朱促杉身上。"
 
 concept_annan_war:0 "安南战争"
 concept_annan_war_desc:0 "[concept_jingsu]五十七年，安南国内发生政变，阮福映弑主自立，僭称“大南皇帝”，[concept_jingsu]认为这是个接入安南的好时机，便派遣大军以复庙讨逆的名义进攻大南。统军将领沐昌明，六皇子朱伯洵监军，两军在富良江决战。明军的火器轻松击破了安南军队的象阵，明军以黎氏的名义招降了升龙的守军，随后一路南下到了顺化。但在之后的治理中，[concept_jingsu]皇帝希望让安南与内地迅速统一，设立了[concept_buzhengsi_china]强推大明律，导致了当地人不满。最终改设较为独立的宣慰司并册封皇子朱伯洵为安南亲王。"

