 #安南统一
 
 je_annan_tongyi:0 "统一安南"
 je_annan_tongyi_reason:0 "自安南内战以来，安南的土地就被一分为二，北方的土地被明朝的安南宣慰司所管辖，而南方则是由越南南朝统治。这种分裂必须结束，越南必须早日决定他自己的命运！"

 CNN_DAI_WAR:0 "安南统一战争"
 annan_war_de:0 "发动统一战争"
 annan_war_de_desc:0 "是时候发起战争，彻底结束南北分裂了！"
 
 je_annan_wending:0 "稳定政局"
 je_annan_wending_reason:0 "安南王决心稳固[COUNTRY.GetName]的政府，加强安南的王权力量，牢牢控制住本地贵族，为进一步的改革提供基础。"
 annan_guizu: "贵族被削弱"

 je_annan_xuexiao:0 "改革科举"
 je_annan_xuexiao_reason:0 "虽然科举已经在最初引入了[COUNTRY.GetName]，但为了安抚本地贵族阶层，以及后续的混乱局势，导致[COUNTRY.GetName]的科举事实上以及变成了腐败滋生的特权生产地，由于不需要明廷的钦点，本地的科举往往存在严重的徇私舞弊和权力操纵，国王殿下希望在任内彻底解决这个问题。"
 
 je_annan_jundui:0 "重整三军"
 je_annan_jundui_reason:0 "安南布政司的耻辱失败让明廷彻底放弃了对此地的直辖，这也是册封藩王替代布政司官员的原因。藩王初就[COUNTRY.GetName]，安南的军队还游离在王宫的控制之外，为了大展宏图，殿下必须先用雷霆手段控制安南军队。"
 
 je_annan_wenhua:0 "弥合文化"
 je_annan_wenhua_reason:0 "安南自汉朝以来就是中华的一部分，却因为五代的羸弱而游离于天朝之外。如今想要将京人重新融入华夏，需要我们想办法弥合两者的矛盾，重塑统一的民族认同。"

 je_annan_ming:0 "奉天靖难"
 je_annan_ming_reason:0 "明王朝的崩溃意味着当今圣上并不坐享天命，奸臣当道、帝王无德，只有殿下才智超人，是继承大统的不二之选。我们应当立刻奉天靖难，让皇位被交给正确的人。"
 
 annan_no_ming: "大明已经灭亡"

 je_annan_ming1:0 "再造大明"
 je_annan_ming1_reason:0 "前明已经在可悲的分裂中崩溃，我们必须继承洪武皇帝的意志，平定中原，让日月重临中华大地！"

 #天命奔溃事件组
 
 je_ming_deaser:0 "明帝国的危机"
 je_ming_deaser_reason:0 "大明正在面临可怕的危机。大明皇室没能遵循天命、统治天下，不再享有上天给予的庇佑和盛名。经年的管理不善和无尽的冲突已形成了痼疾，侵染了整个中华大地，人民的不满正迅速蔓延。一时间，天下汹汹，四处揭竿斩木。《诗》有之：「无念尔祖，聿修厥德」，我们必须感怀先祖、修养德行；毕竟，「宜鉴于殷，骏命不易」，永保天命绝非易事！"
 je_ming_deaser_goal:0 "一旦崩溃进度条满格，我国将再度崩溃。"
 
 je_qisha_daxi:0 "七杀效忠"
 je_qisha_daxi_reason:0 "我军以残暴为天下所知，然而此非我等所愿。如天下安宁，奸凶攘除，那我等也不必频动刀兵。我们致力于消除一切不忠不孝不仁不义之人，定义一个我们眼中的盛世。"
 je_qisha_daxi_tt:0 "天生万物以养人，世人犹怨天不仁。\n不知蝗蠹遍天下，苦尽苍生尽王臣。\n人之生矣有贵贱，贵人长为天恩眷。\n人生富贵总由天，草民之穷由天谴。\n忽有狂徒夜磨刀，帝星飘摇荧惑高。\n翻天覆地从今始，杀人何须惜手劳。\n不忠之人曰可杀！不孝之人曰可杀！\n不仁之人曰可杀！不义之人曰可杀！\n不礼不智不信人，大西王曰杀杀杀！\n我生不为逐鹿来，都门懒筑黄金台，\n状元百官都如狗，总是刀下觳觫材。\n传令麾下四王子，破城不须封刀匕。\n山头代天树此碑，逆天之人立死跪亦死！"
 button_xi1:0 "不忠之人曰可杀"
 button_xi1_desc:0 "叛逆大西朝的人应当被处决！"
 button_xi2:0 "不孝之人曰可杀"
 button_xi2_desc:0 "不孝有三，无后为大。我们要鼓励利益之风，塑造我们的德行。"
 button_xi3:0 "不仁之人曰可杀"
 button_xi3_desc:0 "仁爱是万物之大爱，不仁的官吏暴徒为祸乡里，应当剿灭。"
 button_xi4:0 "不义之人曰可杀"
 button_xi4_desc:0 "义即为公正，我们新朝应当别异于旧朝，鼓励公正之法。"
 button_xi5:0 "不礼之人曰可杀"
 button_xi5_desc:0 "礼义廉耻，人之所钟也。混乱秩序，沦丧礼节者，实在是国家之祸根。"
 button_xi6:0 "不智之人曰可杀"
 button_xi6_desc:0 "我等新朝鼓励开化民智，不知则昏聩。"
 button_xi7:0 "不信之人曰可杀"
 button_xi7_desc:0 "信乃立身之本，不信之人，早晚祸倾朝野。"
 
 ming_theend_events.1.t:0 "农民战争"
 ming_theend_events.1.d:0 "中国的农民向来是最温顺的绵羊，如非迫不得已，绝不会有任何的反抗。因为长久以来的压迫和剥削，农民终于忍无可忍，开始用暴力回应他们的主子。"
 ming_theend_events.1.f:0 "最初只是在几个偏远的乡野，实在无法交出税金的农民在争斗中杀死了他的债主，当地知名的地主。第一次杀人让向来顺从的他惶恐不安，但很快他就回过神来，处理掉了地主剩下的家人。同样被逼的走投无路的破产农民在看着他浑身血迹从地主的府邸出来时，立马就明白了局势。一支斩木为兵的农民军很快从村庄出发，他们冲进了县衙，将淫威作福的税官和县令都吊在了城墙。反抗的农民如蝗虫般蔓延，当帝国反应过来时，已成燎原之势。。。。。"
 ming_theend_events.1.a:0 "绵羊变成了恶魔"
 ming_theend_events.1.b:0 "压迫者才是恶魔"
 ming_theend_events.1.c:0 "贪官污吏！该杀！"
 nongminqiyi:0 "农民起义"
 
 ming_theend_events.2.t:0 "七杀立国"
 ming_theend_events.2.d:0 "经过了几百年，大西国再次重临华夏。这一次，我们将彻底消灭一切罪恶，将不仁不义之徒彻底根除！"
 ming_theend_events.2.f:0 "现在是我们的时代了！"
 ming_theend_events.2.a:0 "统一华夏！"
 
