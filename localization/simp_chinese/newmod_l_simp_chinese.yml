 je_lizhou_coal_reason:0 "黎洲的土地缺乏煤矿供应，这对我们的发展产生了巨大的阻碍。如果我们不能获得稳定的煤矿供应，黎洲就没法进一步工业化，追赶先进国家。"
 
 je_lizhou_edu:0 "书香门第"
 je_lizhou_edu_reason:0 "教育是立国之本，[COUNTRY.GetName]立国伊始，多为贫贱之士，即使如此，也没有将教育的重要性放低。我们作为华夏后裔，应当发扬我们的传统，让所有[COUNTRY.GetName]百姓都能成为书香门第。"
 
 je_lizhou_help:0 "寻求庇护"
 je_lizhou_help_reason:0 "虽然我国摆脱了巨龙的侵扰，但是这并不意味着我们的安全。虎视眈眈的美利坚人将我们的土地视为他们的昭昭天命，我们必须在这以前寻找到新的盟友，帮助我们对抗这帮野蛮人。"
 lizhou_fuyong_tt: "我们是他们的附庸国"

 je_lizhou_empire:0 "威加海内"
