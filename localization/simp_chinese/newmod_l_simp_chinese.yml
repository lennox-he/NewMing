 ming_warlord_events.14.t:0 "五军联名上奏"
 ming_warlord_events.14.d:0 "对于近日朝廷对军队打压态势的不满，五军都督府的几位将领联名上奏，要求朝廷重新正视军队的地位，不要走前宋老路。"
 ming_warlord_events.14.f:0 "今既呈表，已明心志。上若不纳，请以身殉！"
 ming_warlord_events.14.a:0 "既然如此你们就去死吧"
 ming_warlord_events.14.b:0 "诸位误会了，朝廷没有这个意思"
 
