 je_china_shehuizhuyi_3: "改革开放:打破铁饭碗"
 je_china_shehuizhuyi_3_reason: "收入靠贡献，岗位靠竞争；搬掉铁椅子，打破铁饭碗！工人已经在我们的政策的庇护下安稳了太久，他们的劳动激情正在消退，反过来成为阻碍我们国家进步的绊脚石。但是从今以后，这种大锅饭养懒人的情况将会彻底结束，终生的雇佣劳动将不复存在，考核、合同、绩效将成为我们用工未来的方向！"
