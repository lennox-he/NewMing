 #中华群雄
 je_qunxiong_china:0 "统一中国"
 je_qunxiong_china_reason:0 "中华大地陷入割据与分裂，此诚危急存亡之际。我军既承天命，申大义于天下，当弥合金瓯，重塑河山，扫灭宵小，以求四海归一。"
 je_qunxiong_china_1_tt:0 "完成统一华北"
 je_qunxiong_china_2_tt:0 "完成征服华南"
 je_qunxiong_china_3_tt:0 "完成进军燕云"
 
 je_qunxiong_north:0 "统一华北"
 je_qunxiong_north_reason:0 "华北是中华帝国的核心，也是中华文明的发源地，想要称霸中国，我们必须将此地纳入囊中。"
 qunxiong_tianming_1:0 "天命所归"
 
 je_qunxiong_south:0 "征服华南"
 je_qunxiong_south_reason:0 "华南是中华帝国最富饶的土地，这里河如罗网，湖泊密布，土地肥沃，商贸繁荣。我们必须控制这里，让华南的财富成为我们逐鹿中原的资本！"
 qunxiong_tianming_2:0 "发展商贸" 
 
 je_qunxiong_destory:0 "终结伪朝"
 je_qunxiong_destory_reason:0 "伪帝窃据天命，履役黔首，致使生灵涂炭，四海扰攘。我军奉生民之愿，兴仁义之师，乘浩然之气，讨逆命之寇。挽社稷于刀兵之祸，救万民于倒悬之危。"
 qunxiong_tianming_3:0 "应天讨贼" 
 
 je_qunxiong_qianlong:0 "潜龙勿用"
 je_qunxiong_qianlong_reason:0 "君子待时而慎动，厚积而薄发。今群雄逐鹿，四海皆乱，我军无绝顶之势，乏百战之兵，此非用武之际也，吾当保境安民，操练士卒，以为王霸之业。"
 qunxiong_up_1:0 "逐鹿中原"
 
 je_qunxiong_build:0 "大兴土木"
 je_qunxiong_build_reason:0 "我主傲视群雄，提剑四顾，泱泱华夏难有睥睨者。今霸业在望，百废待兴，诚宜兴土木而繁都市，乐生民而荣故园。譬如扩城拓郭，兴贸充市，兹以为盛世之景也。"
 
 fazhan:0 "城市发展"
 
 qunxiong_tianming_4:0 "旭日之朝" 
 
 je_qunxiong_drangon:0 "巨龙觉醒"
 je_qunxiong_drangon_reason:0 "见龙在田，利见大人。我朝蛰伏已久，终有腾飞之日。曦辰东升，霞光万丈，宜当扶摇而上，使我之国家傲立于世界民族之林。"
 qunxiong_age_of_loong:0 "巨龙时代"
 
 qunxiong_events.1.t:0 "群雄逐鹿"
 qunxiong_events.1.d:0 "明失其鹿，天下共逐。四海烽烟，豪杰蜂起，岂知今日之域中，为何人之天下？"
 qunxiong_events.1.f:0 "兴义军，诛伪帝，统江山，福万民！"
 qunxiong_events.1.a:0 "天命在我！"
 
 je_qunxiong_changwei:0 "设立厂卫"
 je_qunxiong_changwei_reason:0 "厂卫是天子的耳目，能用来监察百官，肃清乱党，将权力牢牢地掌握在我们手中。"
 
 ming_jinyiwei:0 "锦衣卫"
 
 je_qunxiong_court_tt:0 "完成统一中国"
 qunxiong_xianren:0 "贤人宫廷"
 
 je_qunxiong_court:0 "朝廷安泰"
 je_qunxiong_court_reason:0 "今天下既定，我朝所患，非在江海之远，乃在朝堂之上也。故协和百官，综理朝政，使朝廷安泰，方可使天下太平，万国来朝也。"
 
 je_qunxiong_court2_tt:0 "完成统一南方和朝廷安泰"
 
 je_qunxiong_trade:0 "贸易政策"
 je_qunxiong_trade_reason:0 "商贸遍行全球，其重要性与往日不可同日而语。今天朝富饶，而商者云至，若不予管辖，必为朝廷之祸。若因势而为，则可为朝廷之福也。"
 
 qunxiong_trade:0 "开放贸易"
 qunxiong_no_trade:0 "闭关锁国"
 
 je_qunxiong_trade_tt:0 "我们对贸易的管理实在乏善可陈，各种问题让我们的官吏捉襟见肘。最终我们决定，放任这帮商人胡闹吧。"
 
 qunxiong_miss_trade:0 "猖獗走私"
 
 qunxiong_tax:0 "户籍制度革新"
 
 je_qunxiong_tax:0 "户籍革新"
 je_qunxiong_tax_reason:0 "我们王朝所推崇的治理系统在近代几乎没有得到革新。因此，我们必须确立一种适当的方式来管理我们治下的广大臣民，并适当减轻腐败和行政过度扩张带来的负面影响。"
 
 je_qunxiong_edu:0 "科举革新"
 je_qunxiong_edu_reason:0 "科举制度为我们提供了广泛优秀的专业官僚。但是他们的知识在日新月异的时代中已经显得不再优越。我们需要革新科举制度，重建教育体系，为我们的帝国提供更优秀的人才！"
 je_qunxiong_edu_tt:0 "完成朝廷安泰和户籍革新"
 
 qunxiong_zhubi:0 "改革税法"
 je_qunxiong_land:0 "税法改革"
 je_qunxiong_land_reason:0 "利用现代的管理制度对我国的税务系统进行完全的革新，彻底扫除隐瞒土地的情况和偷税漏税的恶劣行径，将使我们对于帝国全境的控制能力达到全新的高度！"
 
 je_qunxiong_expand:0 "中华秋海棠"
 je_qunxiong_expand_reason:0 "中国的边疆应该是整个秋海棠，我们应该团结治下的所有民族！"
 
 qunxiong_events.2.t:0 "治理黄河"
 qunxiong_events.2.d:0 "[SCOPE.sState('yellow_river_scope').GetName]一带的黄河大堤已经开始建设，不日将会竣工。"
 qunxiong_events.2.f:0 "大河奔流，泽披万方，长堤一筑，扼惊涛而束汹汹，御地利以为民生，故烝民得恤、商旅得行，此天地之懿德也。至于千里晦暝，银河倒倾，死生一覆，荣枯尽灭，此天地之无情也。是故河情监视，洪涛疏堵，以保长堤之不虞，不敢懈怠也。"
 qunxiong_events.2.a:0 "汹汹涛声，时不我与！"
 
 state_trait_yellow_river:0 "泛滥黄河"
 state_trait_yellow_river_1:0 "黄河"
 huanghe_shigong:0 "河床施工"
 huanghe_shutong:0 "疏通河道"
 huanghe_ok:0 "黄河治理已完成"

 button_huanghe1:0 "治理黄河"
 button_huanghe1_desc:0 "治理黄河不是一项容易的事情，我们需要花费大量的人力和物力，将每一段黄河的河道都修复完整，最终完成整条河流的治理。"
 
 qunxiong_events.3.t:0 "黄河泛滥"
 qunxiong_events.3.d:0 "[SCOPE.sState('yellow_river_scope').GetName]一带的黄河已经决堤，开始泛滥！"
 qunxiong_events.3.f:0 "黄河泛滥之年，涤荡百姓之命，沉淀壅滞河间。众所周知，洪水乃是我大国历朝历代兴亡之相和灾祸的预兆。当务之急是迅速处理损害，以免这成为我们伟大王朝覆灭的导火索。"
 qunxiong_events.3.a:0 "凄哉！"
 qunxiong_events.3.b:0 "尽力救济灾民！"
 
 huanghe_fanlan:0 "严重水灾"
 qunxiong_huanghe:0 "治理黄河"
 
 je_qunxiong_river:0 "疏通河道"
 je_qunxiong_river_reason:0 "黄河是中国的母亲河，但是它的河道却常常淤积泥沙，一旦泛滥，就会导致黄河两岸灾难性的后果！年久失修的河道已经不能在承担抵御洪水的职责，我们必须迅速开始疏通河道，重建黄河大堤！为可能到来的#RED 黄河改道#!提前做好准备！"
 
 qunxiong_events.4.t:0 "[GetYear]的黄河改道"
 qunxiong_events.4.d:0 "今年的雨洵来的比往年都早，很快就超过了黄河水位的安全警戒线，当我们从执勤人员那里得到消息时，黄河的泛滥已经开始了！不同于平常的堤坝损毁，今年的黄河完全像一头猛兽，改变了原有的河道，冲入人口密集的平原地区，从新的河道再次汇入大海，留下了满地狼藉。"
 qunxiong_events.4.f:0 "黄河泛滥之年，涤荡百姓之命，沉淀壅滞河间。众所周知，洪水乃是我大国历朝历代兴亡之相和灾祸的预兆。当务之急是迅速处理损害，以免这成为我们伟大王朝覆灭的导火索。"
 qunxiong_events.4.a:0 "如此天灾，我们无能为力。"
 qunxiong_events_4_tt:0 "因为没有完成黄河的修缮，我们根本无法阻止黄河的改道！！！"
 qunxiong_events.4.b:0 "幸好我们在此之前的河道修缮工作，让我们成功引导黄河完成泄洪！"
