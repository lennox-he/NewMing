 je_china_shehuizhuyi_2: "改革开放:家庭联产承包责任制"
 je_china_shehuizhuyi_2_reason: "事实证明，将土地交还给农民比吃大锅饭的集体农庄更能激发农民的生产积极性。我们应该立刻推广家庭联产承包责任制，结算所有的人民公社，让市场成为农民生产力的推手！"
