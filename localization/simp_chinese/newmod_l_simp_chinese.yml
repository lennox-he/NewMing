 #大顺
 
 je_shun_tax:0 "均田免赋"
 je_shun_tax_reason:0 "朝求生，暮求合，近来贫汉难存活。杀牛羊，备酒浆，开了城门迎闯王！\n 百姓们信任我们，是因为我们均田免赋的口号，但是我们是否真的能如他们所愿还天下一个朗朗乾坤，还需要我们用自己的行动来证明。"
 
 je_shun_landlord:0 "诛杀士绅"
 je_shun_landlord_reason:0 "在中原板荡，饿殍千里的时期，城中的士绅不知发粮救灾，反倒像贪婪的豚妖一样吸食着民脂民膏，变本加厉地剥削灾区的人民。猛药去疴，我们只有用最严厉的方式将他们诛灭，才能保障我们能有一个更加光明的未来！"
 
 je_shun_land:0 "平均地权"
 je_shun_land_reason:0 "我们的权力来自于人民，我们的力量也服务于人民。平均地权是我们新政权成立后需要尽早着手准备的事情，废除一切不平等的制度，做到人人有地耕，人人有粮吃。"
 
 je_shun_opium:0 "禁止鸦片"
 je_shun_opium_reason:0 "一种黑色的毒品在中国西南开始泛滥，它所到之处，民众当妻卖子家破人亡，我们的土地上，绝不能容忍这种惨剧继续扩散！必须尽早阻止这一切！"
 
 je_shun_right:0 "还政于民"
 je_shun_opium_right:0 "闯军从不是一家一姓之军队，天下也不是一家一姓之天下，如今大道既行，是时候还政于民了。"
 
 # 日本国策
 
 jungugo_jap:0 "这会让日本向军国主义发展。"
 
 je_jap_1:0 "大陆政策：征服朝鲜"
 je_jap_1_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n然欲征服世界，必先征服唐土；惟欲征服唐土，必先征服辽东；欲图辽东，先谋划朝鲜。\n现在我国已不与往日同语，想要与西方列强并驱，就需要向外扩张，获取更大的市场和更多的资源，而朝鲜就是我们最合适的目标！"
 je_jap_1_no_kor:0 "朝鲜不存在"
 jap_antijapan:0 "反日活动"
 
 je_jap_2:0 "大陆政策：征服辽东"
 je_jap_2_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n然欲征服世界，必先征服唐土；惟欲征服唐土，必先征服辽东；欲图辽东，先谋划朝鲜。\n朝鲜已经到手，如果能将关东广袤之土地纳入囊中，则平定唐土可计日而待之也。"

 je_jap_3:0 "大陆政策：征服华北"
 je_jap_3_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n然欲征服世界，必先征服唐土；惟欲征服唐土，必先征服辽东；欲图辽东，先谋划朝鲜。\n长城以北已经平定，接下来我国应当一举南下，擒拿伪帝，平定中原！"

 je_jap_4:0 "大陆政策：征服琉球"
 je_jap_4_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n征服唐土之关键，在于夺定唐东南之土；欲取唐东南之土，必先取台湾；欲夺台湾，先取琉球\n如果想要完成对中国的征服，我们必须先从海上出发，从海上彻底封锁中国东南，而第一步，就是夺走中国的属国琉球。"
 
 je_jap_5:0 "大陆政策：征服台湾"
 je_jap_5_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n征服唐土之关键，在于夺定唐东南之土；欲取唐东南之土，必先取台湾；欲夺台湾，先取琉球\n琉球已经取得，此地可以作为我们进攻台湾的跳板。台湾开发日久，拥有丰富的资源和地理位置，我们有必要将他们整合为帝国的一部分。"

 je_jap_6:0 "大陆政策：征服华南"
 je_jap_6_reason:0 "今陛下继承列祖列宗的伟业，欲开拓万里波涛，布国威于四方。\n征服唐土之关键，在于夺定唐东南之土；欲取唐东南之土，必先取台湾；欲夺台湾，先取琉球\n一切准备就绪，对中国的全面战争即将开始，而我们也会夺得东亚正溯，成为亚洲唯一的主导者！"
 
 je_jap_7:0 "武士道精神"
 je_jap_7_reason:0 "长久以来，我国的官方意识形态都受到中国的影响，佛教、儒教甚至道教都在我国有着一席之地。如想摆脱中国，就必须先建立我们自己的信仰。我们将一些尚武思想与我们的传统原始拜物宗教结合，再融合一些中国的哲学思想，形成我们自己的指导宗教！神道教将更有利于我们强化君主至高无上的地位！"
 jap_modifier_wushi:0 "武士道"
 je_jap_8:0 "征服虾夷"
 je_jap_8_reason:0 "自从大和民族存在开始，我们就在同北部的阿伊努人作斗争，并在千年的时间中将他们驱逐出本州岛。现在我们应当更进一步，彻底消灭这群野蛮人，将他们同化为大和民族的一部分。"
 jap_modifier_tonghua:0 "同化虾夷"
 jap_modifier_conquer:0 "殖民扩张"
 button_jap_move_2:0 "整合北海道"
 button_jap_move_2_desc:0 "随着越来越多的日本人进入北海道殖民，我们应该在北海道直接设立管辖机构，而不是放任其成为未整合地区。"
 native_conscription_n: "阿伊努战团"
 ani_def: "反日阿伊努军团"
 
 je_jap_9:0 "移民夏威夷"
 je_jap_9_reason:0 "我国的人口众多，在工业化过程中，产生了严重的社会动荡。但好在我们的邻国，夏威夷愿意接纳我国的移民，他们我国也可以通过这这种方式对其施加影响力。"
 jap_modifier_haw:0 "太平洋霸权"
 button_jap_move_1:0 "移民夏威夷"
 button_jap_move_1_desc:0 "夏威夷缺乏劳动力人口，而我国恰好能为其提供劳工，双方若能达成一致，我们便可以将移民送到夏威夷群岛，增强我们的控制力和影响力。"
 
 je_jap_10:0 "皇民化：台湾"
 je_jap_10_reason:0 "为了让台湾彻底成为帝国的一部分，我们需要推行彻底的皇民化教育，让他们认为自己是日本人，从而忘掉自己原本的种族和血统，成为我们扩大战争的马前卒！"
 jap_taiwan:0 "模范殖民地"
 
 je_jap_11:0 "皇民化：朝鲜"
 je_jap_11_reason:0 "大韩帝国已经在我们的支持下脱离中华，但是让他们整合进帝国是一个漫长的过程，在此之前我们需要对朝鲜人进行深入的皇民教育，让其成为我们的模范殖民地。"
 
 button_jap_tegaoke_1:0 "出动特高课"
 button_jap_tegaoke_1_desc:0 "我们可以出动特工来彻底地摧毁那些反日分子的根据地，杜绝他们的危害。"
 
 je_jap_12:0 "皇民化：满洲"
 je_jap_12_reason:0 "满洲已经归顺了帝国，我们需要派遣开拓团来开发这篇富饶的土地，将其整合后，帝国将不再是悬于孤岛上的羸弱之邦，我们也将拥有问鼎世界的能力。"

 je_jap_13:0 "新式海军"
 je_jap_13_reason:0 "帝国需要一支全新的海军，天皇将让萨摩藩担任这一职责，建设一支隶属于天皇的现代化海军。"

 je_jap_14:0 "新式陆军"
 je_jap_14_reason:0 "帝国需要一支全新的陆军，天皇将让长州藩担任这一职责，建设一支隶属于天皇的现代化陆军。"

 je_jap_15:0 "大政赞翼会"
 je_jap_15_reason:0 "在天皇陛下的英明领导下，日本帝国所有的派别都被整合进入了一个党派，大政翼赞会的宗旨是“实践翼赞大政的臣道，上意下达，下情上通，密切配合政府”。自此以后，服侍天皇陛下，争取帝国之荣耀成为所有皇民的唯一目标，日本将不再拥有那些可笑的党派之争。"
 jap_modifier_zanyi:0 "大政赞翼"
 
 je_jap_16:0 "国民热忱"
 je_jap_16_reason:0 "维新以来，我国国民对于新政颇感兴趣，对于国体的争论也喋喋不休。也许我国发展的方向，最终会决定我们国家的走向！"
 je_jap_16_goal:0 "国民热忱满格会让军国主义成为大众所向的道路，成功的军事扩张日志和军事的进展会让我们偏向军国主义。"
 je_jap_16_fail:0 "民主化完成意味着我们的国民抛弃了军国主义道路。逐步的开化和对武力的克制会让我们偏向于民主主义。"
 
