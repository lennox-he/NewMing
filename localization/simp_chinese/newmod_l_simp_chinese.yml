 je_wuzu_china:0 "五族共和"
 je_wuzu_china_reason:0 "何为中国，不同人有不同的说法。对于我们而言，中国并不是一个固定的民族概念，而是一个文化概念。入华夏则华夏之，入夷狄则夷狄之。诸夏和夷狄是相互转化的，但是他们都围绕在以华夏文明为核心的儒学体系周围。在[SCOPE.GetRootScope.GetCountry.GetName]的百姓看来，满汉蒙回藏是形成中华民族的主要构成部分，我们要形成五个民族和谐共处，构成统一的国族认同，加大我们的文化外向感染力，这有助于我们融合更多的民族，让更多的夷狄沐浴王化，让[SCOPE.GetRootScope.GetCountry.GetName]的边疆永无终点！"
 je_wuzu_china_lobby:0 "$je_wuzu_china_reason$"
 je_wuzu_china_success:0 "兵部和五军都督府丧失了权力，一个新的机构成立了！"
 wuzu_han:0 "汉是主流文化"
 wuzu_man:0 "满是主流文化"
 wuzu_meng:0 "蒙是主流文化"
 wuzu_wei:0 "维是主流文化"
