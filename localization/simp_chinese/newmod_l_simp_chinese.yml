 cnl_events.7.t:0 "吸引中国移民"
 cnl_events.7.d:0 "我们优越的定居点已经吸引了大量中国移民前来定居，他们将为我们的社会注入新的活力！"
 cnl_events.7.f:0 "春风一夜到衡阳，楚水燕山万里长。\n莫道春来便归去，江南虽好是他乡。"
 cnl_events.7.a:0 "欢迎我们的同胞"
 
 cnl_faan_feichu:0 "废除法案"
 button_lizhou_2:0 "废除法案"
 button_lizhou_2_desc:0 "将我们已经通过的法案废除掉"
 button_lizhou_1:0 "赎买华盛顿州"
 button_lizhou_1_desc:0 "为了解决煤矿供应问题，也许我们应该向我们的友邦提出购买省份的请求。"
 
 cnl_events.3.t:0 "[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]拒绝和解"
 cnl_events.3.d:0 "我们派往[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]的使节已经返回了京师，尽管[SCOPE.GetRootScope.GetCountry.GetName]一直尝试释放善意，但是[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]无法原谅我们在统治新大陆时期犯下的总总过错，他们的人民并没有从敌对的情绪中走出来。关于重新册封和加强合作的提议。"
 cnl_events.3.f:0 "就在几十年前，还叫黎洲宣慰司的新大陆政府还是大明帝国领土的一部分，但是随着丝绸事件的爆发，新大陆迅速掀起了对明帝国的叛乱，并最终以明军和黎洲总督撤离新大陆而告终。大明对黎洲的封锁已经有十几年之久了，两国的关系也将进入新的篇章......"
 cnl_events.3.a:0 "这帮逆贼，还想再来一次[concept_silkwar]吗？"
 cnl_events.3.b:0 "还是让时间冲淡一切吧。"
 
 cnl_events.4.t:0 "[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]重新朝贡"
 cnl_events.4.d:0 "我们派往[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]的使节已经返回了京师，他们以及详细地讨论了大明提交给他们的方案，并决定承认[SCOPE.GetRootScope.GetCountry.GetName]天子的权威，换取重新加入我们的经济圈。"
 cnl_events.4.f:0 "就在几十年前，还叫黎洲宣慰司的新大陆政府还是大明帝国领土的一部分，但是随着丝绸事件的爆发，新大陆迅速掀起了对明帝国的叛乱，史称[concept_silkwar]，并最终以明军和黎洲总督撤离新大陆而告终。大明对黎洲的封锁已经有十几年之久了，两国的关系也将进入新的篇章......"
 cnl_events.4.a:0 "度尽劫波兄弟在，相逢一笑泯恩仇。"
 
 cnl_events.5.t:0 "解决煤矿危机"
 cnl_events.5.d:0 "我国的煤矿问题终于得到了缓解，这意味着我国的工业化得到了充分的保障！"
 cnl_events.5.f:0 "蒸汽机的推广让煤炭成为了我们的工业血液，现在我们已经从一个虚弱的病人中恢复过来了！"
 cnl_events.5.a:0 "发动机器吧！"
 
 cnl_events.8.t:0 "[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]请求购买"
 cnl_events.8.d:0 "[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]的使者宣称他们的煤矿供应存在问题，希望获得我们一个省份的开采权。"
 cnl_events.8.f:0 "如果没有煤矿，[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]将不能进一步发展，这有悖我们之间的友谊。"
 cnl_events.8.a:0 "这没什么，接受它"
 cnl_events.8.b:0 "让他们自己和当地总督谈吧"
 
 concept_silkwar: "丝绸战争"
 concept_silkwar_desc: "丝绸战争是发生在[concept_jingsu]三十七年[GetPlayer.MakeScope.Var('ming_fushu').GetCountry.GetName]与他的[concept_colony][GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]的一场战争，事件的起因是因为[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]反对[GetPlayer.MakeScope.Var('ming_fushu').GetCountry.GetName]强制禁止[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]种植丝绸，并要求他们只能购买来自大明的丝绸的暴政而导致的[concept_revolution]，几个[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]青年冲上停靠在金山港的[GetPlayer.MakeScope.Var('ming_fushu').GetCountry.GetName]商船，将所有丝绸当场焚烧，最终演化为全面的独立战争。这场[concept_war]因为大明并没有对新大陆给予过高的期望，以及国内北部边界的严峻形势，最终以大明撤军告终。[GetPlayer.MakeScope.Var('lizhou_fushu').GetCountry.GetName]获得了独立，但是随之而来的整个帝国的敌视和[concept_embargo]。"
 
 ming_events.18.t:0 "远南宣慰司"
 ming_events.18.d:0 "自从郑经开辟南洋航线以后，远南逐渐形成了与土著贸易的港口据点，并在百年间逐渐壮大繁荣，形成了今天的远南宣慰司，然而宣慰司成立后，大明的重心逐渐转向国内，与宣慰司的联系逐渐减少衰弱。"
 ming_events.18.f:0 "海外有岛焉，曰远南，去华夏五万里，蜉蝣狂海之外。其民筚路蓝缕，辟土于荒蛮，沐恩而教化，尔来一百三十一年矣---《大明万国舆图》"
 ming_events.18.a:0 "开始工作"
 
 #远南日志
 
 je_yuannan_1: "开发昆阳"
 je_yuannan_1_reason: "昆阳省虽然很早就被我国征服，但我们对这篇荒芜的土地一直只存在象征性的管理，并没有实际的进行开发。我们需要将此地完全纳入我们的管辖，从而巩固我们再远南大陆的统治！"
 
 je_yuannan_2: "吸引移民"
 je_yuannan_2_reason: "自从大明的商队在远南建立据点，已经过去一百三十多年，但此地依旧人口稀少。大部分人只把这里当作边远蛮荒的边陲治所，而我们将会告诉他们这片土地真正的潜力！我们会让这里变成所有中国人梦寐以求的富饶之地！"
 je_yuannan_2_mod: "潜力之地"
 
 je_yuannan_3: "矿车之国"
 je_yuannan_3_reason: "远南地区看似贫瘠，土地也并不肥沃，但是根据我们的勘探，此处的矿藏实在是丰富的惊人！我们应该紧抓我们的优势，将矿业打造为我们的招牌，成为名副其实的矿车之国！"
 je_yuannan_3_tt: "完成矿车之国日志"
 company_china_yuannan: "远南矿业可用"
 
 je_yuannan_4: "统一远南"
 je_yuannan_4_reason: "我们并不孤单，或者说，我们其实有不少不讨人喜欢的邻国。一些来自欧罗巴大陆的红毛夷占据着我们的临近地区，并咄咄逼人地进行圈地扩张。我们必须驱逐这些外部势力，将整片大陆控制在我们的手中！\n--弓背霞明剑照霜，秋风扬帆下南洋"
 
 je_yuannan_5: "北部屏障"
 je_yuannan_5_reason: "南方大陆已经在我们的控制之下，但是为了更牢固地包围我们的基业，我们应该夺取北方的岛屿作为我们的屏障。"
 
 ming_events.19.t:0 "黎洲的抉择"
 ming_events.19.d:0 "黎洲曾经是大明最遥远的领土，数以万计想要淘金的百姓在移民机构的鼓动下纷纷前往此地。然而在#BOLD 旧金山焚烧丝绸#!事件后，黎洲地区驱逐了大明官员，实行了共和自治。几年过去了，大明和黎洲的关系有所缓和，我们应该重新设定对大明的政策。"
 ming_events.19.f:0 "自华夏以东万里，极日出之地，有陆焉，谓之黎洲。富金矿，无邦国，气节有类中原，遂有明人移焉。---《大明万国舆图》"
 ming_events.19.a:0 "与明朝和解"
 ming_events.19.b:0 "终止与明朝一切联系"
 
 ming_events.20.t:0 "明王朝的末路"
 ming_events.20.d:0 "历经了接近五百年的大明王朝走向了终结。内乱和政变给了这个庞大的帝国最后一击，野心家和军阀把这个帝国瞬间肢解。明朝还有机会重整河山吗？"
 ming_events.20.f:0 "滚滚长江东逝水，浪花淘尽英雄。\n是非成败转头空。\n青山依旧在，几度夕阳红。\n白发渔樵江渚上，惯看秋月春风。\n一壶浊酒喜相逢。\n古今多少事，都付笑谈中。"
 ming_events.20.a:0 "明朝会继续复兴！"
 ming_events.20.b:0 "大顺会夺取天下！"
 ming_events.20.c:0 "大西将统一中国！"
 ming_events.20.h:0 "郑家将重整江山！"
 
 ming_events.22.t:0 "颁布新税法"
 ming_events.22.d:0 "旧的税法已经不再适合中国的国情，我们要颁布新法律。"
 ming_events.22.f:0 "彻底废除人头税，我们将获得更高效的政府。"
 ming_events.22.a:0 "天命永存！"
 
 ming_events.23.t:0 "[SCOPE.sState('duoqu_diqu').GetName]的边界冲突"
 ming_events.23.d:0 "在我们军队的强硬态度下，我们取得了[SCOPE.sState('duoqu_diqu').GetName]地区的宣称。"
 ming_events.23.f:0 "我们应该征服这里！"
 ming_events.23.a:0 "[SCOPE.GetRootScope.GetCountry.GetName]万岁！"
 
 ming_events.24.t:0 "藩镇时代结束"
 ming_events.24.d:0 "所有的藩镇都失去了权力，我们集中了所有权力。"
 ming_events.24.f:0 "混乱的割据时代结束了，从此以后，只有大明军队。"
 ming_events.24.a:0 "[SCOPE.GetRootScope.GetCountry.GetName]万岁！"
 
 ming_events.25.t:0 "外东北诉求"
 ming_events.25.d:0 "外兴安岭自古以来就是我们的土地，但是俄罗斯却在我们与清朝对峙时非法占有了这里，我们概不承认一切不平等条约，誓将守护我们的领土完整。"
 ming_events.25.f:0 "俄罗斯必须归还外兴安岭。"
 ming_events.25.a:0 "驱逐俄罗斯殖民者！"
 
 ming_buy_manchu:0 "我们同意先礼后兵，向俄罗斯赎买外兴安岭，如果他们不同意，我们可以对他们使用武力。"
 
 ming_events.26.t:0 "中国的无理要求"
 ming_events.26.d:0 "我们与清政府的交易让我们合法获得了外东北地区，但是中国政府却不再承认我们权益的合法性，并且公然要求我们返还这块土地。外东北是我们征重要据点，我们不能就这样拱手相让。"
 ming_events.26.f:0 "俄罗斯很大，但是没有一块土地是多余的。"
 ming_events.26.a:0 "如果想要，得花重金赎买。"
 ming_events.26.b:0 "没有人能从俄罗斯手中获得土地。"
 
 ming_events.27.t:0 "陆地霸权"
 ming_events.27.d:0 "我们已经拥有了一支能让整个世界为之震撼的庞大陆军，他们足够支持我们支配整个世界。"
 ming_events.27.f:0 "帝国的朝阳正在升起。"
 ming_events.27.a:0 "我们的目光看向大陆"
 
 ming_events.28.t:0 "海洋霸权"
 ming_events.28.d:0 "我们已经拥有了一支能让整个世界为之震撼的无敌舰队，他们足够支持我们支配所有大洋。"
 ming_events.28.f:0 "帝国的海域无穷无尽。"
 ming_events.28.a:0 "我们的目光看向深海"
 
 ming_events.29.t:0 "民族主义思想传播"
 ming_events.29.d:0 "因为民族主义思想不断的酝酿传播，我国的一位政治家转变为了狂热的民族主义者，并希望将帝国建设成为一个纯粹的民族国家。"
 ming_events.29.f:0 "每一个可怜巴巴的笨蛋，在这世上没有一样自己能为之感到骄傲的东西，他就只有最后一招：为自己所属的民族而骄傲了。由此他获得了补偿。所以，他充满感激之情，准备不惜以“牙齿和指甲”去捍卫自己民族所特有的一切缺点和愚蠢。---叔本华"
 ming_events.29.a:0 "民族主义时代"
 
 ming_events.30.t:0 "排外运动"
 ming_events.30.d:0 "因为民族主义的空前狂热，[SCOPE.sState('baoluan_provinces').GetName]地区的汉人开始发起对异族的肃清运动，他们冲进异族的家中，洗劫他们的财产，烧毁他们的宅邸，留下满地的血色。"
 ming_events.30.f:0 "你做了什么？\n没什么，不过是一个普通爱国者该做的。这帮蛮夷就不该留在[SCOPE.sState('baoluan_provinces').GetName]，这是他们自找的。我不过是代替上天行使天汉的意志，天佑大汉，不是吗？"
 ming_events.30.a:0 "这不怪我们，谁让他们不离开[SCOPE.sState('baoluan_provinces').GetName]呢？"
 
 ming_events.31.t:0 "隐藏土地被清查"
 ming_events.31.d:0 "随着全国土地勘察的结束，被豪族士绅隐瞒的土地被清查造册送往中央。"
 ming_events.31.f:0 "经勘察，广平县有私匿土地二十五万亩，平原县私匿土地一十八万亩......"
 ming_events.31.a:0 "太好了"
 
 ming_events.32.t:0 ""
 ming_events.32.d:0 ""
 ming_events.32.f:0 ""
 ming_events.32.a:0 ""
 
 ming_events.33.t:0 "殖民地问题讨论"
 ming_events.33.d:0 "世界秩序已经改变，我们接下来应该思考另一个问题了。"
 ming_events.33.f:0 "世界欠发达地区遍布着未受到承认的松散政权，他们虽然有名义上的领袖和土地，但是在前帝国主义时期，他们只被认为是未开化的野蛮人，而不被承认拥有正当的国际地位，所有人都可以肆意在他们的国土上殖民扩张。如今，我们应该如何看待这些欠发达的松散部落呢？"
 ming_events.33.a:0 "他们的主权也应当收到尊重"
 ming_events.33.b:0 "蛮貊之人，需要我们的教化"
 
 ming_events.34.t:0 "皇帝遇刺！"
 ming_events.34.d:0 "因为帝国中枢长久的不作为，进步人士感到不满，发动了政变！"
 ming_events.34.f:0 "刺客在皇帝迅游的时候迅速出手，侍卫很快逮捕了相关人士，但是天子情况非常危急。"
 ming_events.34.a:0 "先帝已死，现在是维新派掌权了！"
 ming_events.34.b:0 "谢天谢地，皇帝陛下挺过来了！"
 
 je_land_or_sea:0 "海权还是陆权"
 je_land_or_sea_reason:0 "我国无可避免地被卷入了列强的争端，加入了世界舞台。然而民力有限，我国只能选择一个发展路线。我们可以选择成为庞大陆军的陆权国家，或者打造一支称霸大洋的无敌舰队。"
 ming_haiquan:0 "大明海权"
 ming_luquan:0 "大明陆权"
 
 je_huanghan:0 "汉祚狂热"
 je_huanghan_reason:0 "汉祚代表了我们民族情绪的狂热度，越高的民族热情会给我们越好的加成。\n•如果没有发起战争，民众的热情会逐渐衰退。\n•拥有民族主义或者法西斯意识形态的领袖会增加狂热值。\n•政府内拥有和平主义，共产主义或者社会民主主义意识形态的领导人会降低狂热值。\n•对[concept_major_power]或更高等级的国家强制执行[concept_war_goal]。\n•狂热值的不同给予我们不同强度的buff"
 
 button_hh1:0 "进献财富"
 button_hh1_desc:0 "我们的民族万众一心，为了民族的未来，我们可以毁家纾难。"
 
 button_hh2:0 "纠察叛徒"
 button_hh2_desc:0 "很难想象，即使是现在，我国依然存在大量背叛民族的汉奸。我们要把这些反对国家的异见分子统统消灭。"
 
 button_hh3:0 "恭颂德政"
 button_hh3_desc:0 "在我们的统治下，汉民族的地位回到了正轨，我们应该大力歌颂这一功德，强化我们的政府。"
 
 button_hh4:0 "扩张汉土"
 button_hh4_desc:0 "日月所照，皆为汉土。我们的生存空间永无止境。"
 
 ming_dezheng:0 "万众一心"
 ming_pantu:0 "全民肃反"
 
 xuanweisi_events.11.t:0 "生存空间"
 xuanweisi_events.11.d:0 "我们需要不断争取我们民族的生存空间，现在我们已经确定[SCOPE.sState('xuanweisi_hanhua').GetName]实质上就是我们的生存空间的一部分，此地的蛮夷已经被基本涤荡。只剩下最后一步了。"
 xuanweisi_events.11.f:0 "就是这样，不断扩展我们民族的生存空间！"
 xuanweisi_events.11.a:0 "大汉万岁！"
 
 je_abolish_poll_tax:0 "推行摊丁入亩"
 je_abolish_poll_tax_reason:0 "户籍制度曾是[SCOPE.GetRootScope.GetCountry.GetName]的牢固基石，但是这种制度未免有些不适合时代的发展，人头税已经成为绝大多数平民的负担，并且阻碍人口的增长。#BOLD 摊丁入亩#!是我们目前的最佳选择。废除人头税，将税收变成以实际土地所有制度为基础的税收统计制度。一切由#BOLD 洪武皇帝#!制定的免税条款都将被废除。"
 je_abolish_poll_tax_lobby:0 "$je_abolish_poll_tax_reason$"
 je_abolish_poll_tax_goal:0 "完成这些改革可以让[SCOPE.GetRootScope.GetCountry.GetName]的百姓摆脱#BOLD 人头税#!的压迫！为了做到这些，我们需要："
 je_abolish_poll_tax_success_1:0 "#tooltippable;tooltip:je_abolish_poll_tax_1 一、通过日志选项压制国内#BLUE 士绅#!，保证计划推行。#!"
 je_abolish_poll_tax_1: "使用摊丁入亩日志上方的决议打压士绅。"
 
 je_abolish_poll_tax_success_2:0 "#tooltippable;tooltip:je_abolish_poll_tax_2 二、在全国开展堪探#BOLD 丈量工作#!，彻底废除#BOLD 人头税#!!。#!"
 je_abolish_poll_tax_2: "完成全国土地测量工作日志"
 je_abolish_poll_tax_success_3:0 "#tooltippable;tooltip:je_abolish_poll_tax_3 三、彻底终结士绅优待，颁布新税法#!"
 je_abolish_poll_tax_3: "使用摊丁入亩日志上方的决议废除士绅优待."
 fail_to_abolish_poll_tt:0 "对百姓的严苛剥削和因各种原因导致的大饥荒会导致一场大起义正在酝酿。"
 new_law_ming:0 "一项新的法律被颁布！"
 start_measuring: "已经开始测量工作"
 
 je_measuring:0 "全国土地测量工作"
 je_measuring_reason:0 "[SCOPE.GetRootScope.GetCountry.GetName]是一个庞大的帝国，这意味着我们的国土情况错综复杂，藏匿土地和逃税在帝国的土地上比比皆是。因此，我们必须进行一次彻底的土地清查，来了解我们帝国的具体情况。<高合法性会让测量结果更正面，低合法性会导致更多负面事件。>"
 je_measuring_goal:0 "[SCOPE.GetRootScope.GetCountry.GetName]的的土地将被彻底清查！"
 je_measuring_success:0 "一份详细的全国农业地图被呈上朝廷，我们会获得额外的可使用土地。"
 fail_to_measuring_tt:0 "未能按时完成测量工作。"
 
 je_recover_beijing:0 "收复燕云"
 je_recover_beijing_reason:0 "北京和辽宁一直是我们不可分割的一部分，可是自从1627年满洲人反叛朝廷以来，这两地就逐渐沦为了清朝的统治。在1672年的北京之战以我军的无功而返告终后，我们停在燕云以南已经有将近两百年，是时候将他们收复了！"
 je_recover_beijing_lobby:0 "$je_recover_beijing_reason$"
 recover_beijing_tt:0 "[SCOPE.GetRootScope.GetCountry.GetName]的人民不能忍受$STATE_BEIJING$和$STATE_SHENGJING$一直游离在外！"
 shoufu_yanyun_tt:0 "故土终复"
 fail_to_shoufu_yanyun_tt:0 "我们未能收复燕云地区，随着民族主义的固化，这里产生了新的民族认同。"
 yanyun_provinces:0 "燕云地区"
 
 je_solve_monglian:0 "终结游牧民族"
 je_solve_monglian_reason:0 "游牧民族是困扰中国近千年的难题，西北的准噶尔部崛起以及有一百多年了。如果我们不能尽早解决游牧民族的问题，他们可能会在以后给我们造成难以想象的麻烦。"
 je_solve_monglian_goal:0 "不能有任何一个游牧民族的国家继续存在,请彻底消灭准噶尔和蒙古国。"
 je_solve_monglian_success_tt:0 "长城内外是一家！"
 
 je_zheng_army:0 "郑家军问题"
 je_zheng_army_reason:0 "郑家是大明的英雄，在国家危难之际，他们仍然坚持抗敌。但是，随着时间的迁移，他们已经成为了顽固的军阀，是时候让他们去养老了！"
 je_zheng_army_goal:0 "我们应该让郑氏家族离开朝廷。"
 je_zheng_army_success:0 "军队被肃清"
 
 je_end_Qing:0 "终结大清"
 je_end_Qing_reason:0 "我们已经无法容忍清朝的存在了，为了彰显我们是天下唯一的合法统治者，我们必须彻底消灭清政府。"
 je_end_Qing_tt:0 "清朝走向终结，现在是清算时刻..."
 fail_je_end_Qing_tt:0 "我们错失了彻底消灭清朝的最佳时机。"
 
 je_nuergan_china:0 "重建奴儿干都司"
 je_nuergan_china_reason:0 "奴儿干都司曾经是大明统治东北地区的行政机构，现在我们应该尝试重建奴儿干都司，取代清朝在此的统治，重新施加我们的影响力。"
 manchu_to_liao:0 "部分满人转化为辽人"

 je_ming_xixue:0 "西学东渐"
