 ming_events.37.t:0 "世界秩序之讨论"
 ming_events.37.d:0 "我国目前在世界上已经有了一定的话语权，然而这个世界并非由我们主导，而是被殖民时代霸占世界话语权的西方国家主导，这意味着我们要么选择加入，要么选择对抗这个世界秩序。"
 ming_events.37.f:0 "现在，我首先谈不同的思想意识和社会制度问题。我们应该承认，在亚非国家中是存在有不同的思想意识和社会制度的，但这并不妨碍我们求同和团结。第二次大战后，亚非两洲兴起了许多独立国家，一类是共产党领导的国家，一类是民族主义者领导的国家。前一类国家并不多。但是某些人所不喜欢的，就是6亿中国人民选择了中国共产党领导的、属于社会主义体系的政治制度，而不再为帝国主义所统治了。后一类国家很多，像印度、缅甸、印度尼西亚和亚非许多国家都是。我们这两类国家都是从殖民主义的统治下独立起来的，并且还在继续为完全独立而奋斗。我们有什么理由不可以互相了解和尊重、互相同情和支持呢?五项原则完全可以成为在我们中间建立友好合作和亲善睦邻关系的基础。我们亚非国家，中国也在内，不论在经济上或文化上都落后。我们亚非会议既然不要排斥任何人，为什么我们自己反倒不能互相了解、不能友好合作呢?\n次之，我要谈有无宗教信仰自由的问题。宗教信仰自由是近代国家所共同承认的原则。我们共产党人是无神论者，但是我们尊重有宗教信仰的人。我们希望有宗教信仰的人也应该尊重无宗教信仰的人。中国是有宗教信仰自由的国家，它不仅有700万共产党员，并且还有以千万计的回教徒和佛教徒，以百万计的基督教徒和天主教徒。中国代表团中就有虔诚的伊斯兰教的阿訇。这些情况并不妨碍中国内部的团结，为什么在亚非国家的大家庭中就不能将有宗教信仰的和没有宗教信仰的人团结在一起呢?挑起宗教纷争的时代应该过去了，因为从挑起那种纷争中得到利益的并不是我们中间的人。\n第三，我要谈所谓颠覆活动的问题。中国人民为反对殖民主义所进行的斗争超过100年。中国共产党领导的民族、民主的革命斗争也经历了近30年的艰难困苦的过程，才终于达到了成功。中国人民在帝国主义、封建主义和蒋介石统治下所受的苦难是数也数不尽的，最后才选择了这个国家制度和现在的政府。中国革命是依靠中国人民的努力取得胜利的，决不是从外输入的，这一点连不喜欢中国革命胜利的人也不能否认。中国古话说：“己所不欲，勿施于人。”我们反对外来干涉，为什么我们会去干涉别人的内政呢?有人说，中国在国外有1000多万华侨，可能利用他们的双重国籍来进行颠覆活动。但是，华侨的双重国籍问题是旧中国遗留下来的，蒋介石至今还在利用极少数的华侨进行对所在国的破坏活动。新中国的人民政府却准备与有关各国政府解决华侨的双重国籍问题。又有人说，在中国有傣族自治区威胁了别人。中国境内有几十种少数民族共4000多万人。其中傣族和相同系统的壮族将近千万人。他们既然存在，我们就必须给他们自治权利。好像缅甸有掸族自治邦一样，在中国境内各个少数民族都有他们的自治区。中国少数民族在中国境内实行自治权利，如何能说威胁邻邦呢?我们现在准备在坚守五项原则的基础上与亚非各国，乃至世界各国，首先是我们的邻邦，建立正常关系。现在的问题不是我们去颠覆别人的政府，倒是有人在中国的周围建立进行颠覆中国政府的据点。比如在缅甸边境就存在着蒋介石集团的残余武装分子，对中缅两国进行破坏。因为中缅友好，我们一直尊重缅甸的主权，信任缅甸政府去解决这个问题。\n中国人民选择和拥护自己的政府，中国有宗教信仰自由，中国决无颠覆邻邦政府的意图。相反的，中国正在受着美国政府公然不讳地进行颠覆活动的害处。大家如果不信，可亲自或派人到中国去看。我们是容许不知真相的人怀疑的，中国俗语说：“百闻不如一见。”我们欢迎所有到会的各国代表到中国去参观，你们什么时候去都可以。我们没有竹幕，倒是别人要在我们之间施放烟幕。\n16亿亚非人民期待着我们的会议成功。全世界愿意和平的国家和人民期待着我们的会议能为扩大和平区域和建立集体和平有所贡献。让我们亚非国家团结起来，为亚非会议的成功努力吧!"
 ming_events.37.a:0 "我们选择接受这个秩序"
 ming_events.37.b:0 "我们会和西方列强对抗到底！"

 pro_now_system: "我们会成为现行世界体制的支持者，如果有新的挑战者想要颠覆世界秩序，我们会和现有秩序站在一边。"
 pro_now_system_1: "宣布支持现行世界秩序的国家会是我们的敌人。"

 ming_historical_events.1.t: "拜谒忠武王庙"
 ming_historical_events.1.d: "忠武王五次北伐试图克复燕蓟，然而最终病倒在了白沟河驿。他死后，当地百姓为其立庙，最初以山神庙为名掩人耳目。后胡廷与明廷关系渐缓，默许之，亦差人修缮。"
 ming_historical_events.1.f: "昭武五年始，五伐幽燕。初，破德州，克天津，焚通州，虏师不敌。八年，出正定，围燕京。朝中谗言，无功辄返。十年，清虏寇保定，成功率军据之，贼溃，成功轻敌逐之，中伏于拒马河，王师几殁，虏骑逐至济水，辎重尽丧，伏尸千里。王请致仕，帝不许。十三年，集宣大、顺营出宣化，王师出廊坊，数败虏军，再临京师，寇得英夷之佛朗基炮，镇之九门，不得克，乃返。忠武王数临旧京，八旗震怖，贼酋东迁。然清虏依坚城之险，上下死战，终不克。昭武十五年，会战燕郊，明军势盛，虏军固守不敢出。然成功旅途劳顿，久感风寒，扶辕欲视故都，雾浓不得见，成功怆然涕泪，不复言，次日，奉天翊运推诚宣力定难延平亲王、总摄朝政督师北伐总理中外军国重事、总督东南诸省兼理吕宋抚夷钦差、提督汉番水陆诸军招讨大将军、宗人府宗人令、领南京中军都督府事臣--成功,薨于白沟河驿，年六十。六军秘不发丧，白布缠臂，星夜归于真定。帝闻之，悲绝挽之，追忠武王。\n史官曰：\n成功以海寇之资，怀孤忠之志。台澎开基，吕宋雪耻，五叩燕关，气吞海岳，虽武侯北伐未若此勤也！然天不假年，雾失蓟门，岂非命耶？忠武绝而后世继，烈士陨而山河存。至若诸镇坐大，实因后继者无王之人望——昔者诸侯畏其威而效命，后则轻其子而萌异。悲夫！-------《明史：忠武王世家-其三》"
 ming_historical_events.1.a: "大明无忠武王，山河定不得存"

 ming_historical_events.2.t: "厦门军港"
 ming_historical_events.2.d: "厦门军港，曾是国姓爷忠武王起兵之处，彼时忠武王与降清的父亲决裂，后屯兵金厦，坚持与清军斗争。从此地出兵会师张煌言，后征台湾、克吕宋，皆出兵于此。这里也是郑家军心中的圣地，大明海军军官都会在就任后拜谒此处。"
 ming_historical_events.2.f: "郑森，字大木，福建南安人。父芝龙，闽海豪酋；母田川氏，东瀛人也。森少聪颖，隆武帝见而奇之，赐国姓“朱”，改名成功，授御营中军都督。未几，芝龙降清，成功泣谏曰：“父教子忠，奈何自叛？”遂焚青衣于孔庙，誓曰：“此身许国，敢有二心！”。\n永历十三年，会张煌言舟师北伐，破瓜洲，克镇江，直薄金陵。江南父老箪食壶浆，谓中兴在望。然清廷伪示援绝，守将梁化凤穴城夜袭，王师溃于观音山。成功慨然曰：“岂天未厌胡运乎？”退守厦门。十五年，复振旗鼓，亲率舟师二万、舰三百攻台。红夷炮垒如星，诸将惧，成功叱曰：“赤嵌城头，岂无汉骨耶？”卒克热兰遮，夷酋揆一泣降。然闻清廷戮其父芝龙，呕血数升，誓曰：“不犁燕庭，此恨不销！”\n十六年，征吕宋。时西夷虐华，血洗涧内，成功遣责问，夷拒而辱之，遂发兵夷其堡。吕宋既下，得银舰无算，乃置甲必丹营，汉番混编。及返，闻帝崩于昆明，大嚎西拜，数日不进饮食。-------《明史：忠武王世家-其一》"
 ming_historical_events.2.a: "天佑大明，兴于闽海"

 ming_historical_events.3.t: "金陵皇城"
 ming_historical_events.3.d: "南京城始建于元至正廿六年，完工于明洪武廿六年，历时28年，乃遵循礼制、呼应天象、顺应自然的杰作，依照《周礼》为原则，根据“三垣、二十八宿”的星象，结合南京虎踞龙盘、依山傍水的地理优势，一改以往都城墙取方形或矩形的旧制而筑，成为中国礼教制度、传统堪舆天象和自然地理相结合的典范，独树一帜。燕庭动荡，忠武王厉兵秣马，枕戈待旦，终于抓准时机，北克应天，南京始为光复。后昭武帝作践阼，以此为都，拜成功为总摄朝政督师北伐总理中外军国重事，总督五军都督府事，由延平郡王加封延平亲王。"
 ming_historical_events.3.f: "而后贼酋福临没于壮年，燕廷为乱。成功厉兵数年，始得良机，随挥师渡海，百姓无不箪食壶浆，虏伥望风而降，王师遂入金陵。\n昭武元年，奉永王慈炤返跸金陵，甲申板荡，永王流落中原，几经反折，之于江南，时弘历覆，帝隐于徽州，王师至，乃前呈身世。帝倚为柱石，拜辅政亲王，总摄五军。各地诸侯起兵应之，李来亨部入关中，于辅臣合兵，克西安，据武、潼以拒虏，可望出于川蜀，伪总督困于无援，不能敌，于是燕庭颓势。三藩遂自立，成功以鸟船驰袭番禺，连破之，三桂死而大仇报。又北伐中原，以铁人军、吕宋手炮营为引，虏军畏却之，莫与之敌，开封既克，西路诸藩遂朝于廷，得封敕。-------《明史：忠武王世家-其二》"
 ming_historical_events.3.a: "洪武旧城，昭武新都"

 ming_historical_events.4.t: "五军都督府"
 ming_historical_events.4.d: "五军都督府最初由太祖洪武皇帝设立，用以加强皇帝对军队的控制。至土木堡之变以来，五军都督府逐渐衰微，其功能被兵部逐渐取代。忠武王复国以来，于南京重新设立了五军都督府，并总摄五军，各路藩镇也在都督府内任职和参与考核。然而文祯皇帝之后，各路藩镇逐渐走向失控，开始与中央貌合神离，他们往往左右中央决策，干扰皇帝的行动。当今皇帝知道，改革都督府的时候要来了。"
 ming_historical_events.4.f: "文祯皇帝讳和垣，昭武帝长子也，母孝端皇后周氏。帝生而隆准，性宽仁，好释典。昭武三十六年春正月，昭武帝崩，尊谥烈祖威皇帝，太子即皇帝位，改元文祯，颁诏大赦。文祯元年，帝苦藩镇支用无度，每每以备夷看边为名索饷，每不予，则劝之以崇祯故事，帑库空虚，帝不能已，召诸藩督师入觐，颁《武臣敕谕》于午门“凡千户以下，许尔自除；岁饷毋逾赋十一。敢私盟、越境、截士子者，天下共击之！”，遂解藩饷之苦，且藩镇取于封所，财源得限，不得无度扩编，然藩镇自此，人事、财源皆以自取，自是渐离朝廷。此祸始也。文帝初，延平王郑经摄政，与红毛夷隙于南海，夷据旧港，锁三佛齐，华商不得通。为拓商道，避夷船而南向，忽至新陆，未见于舆图，谓之远南。遂登陆设埠，始通商，后以此建城，谓之远南城，设昆阳省。至拓新城，名之郑启。东拓天恩省，都于澳阳。后闽客多迁于此，帝设远南宣慰司治之。文祯四年，郑经薨，帝以爵利抚之后裔，收权亲政。“郑氏子弟，爵禄如故，军政勿预。”帝悯民力，引吕宋稻种，苏胡增产无数，江南殷实。帝遂推行新钞，曰文祯宝钞，然无金银为依，豪强拒纳，商贾折价三成，十年乃废。十九年，达赖入朝，请设都司，帝允之，设庙安抚，令川云征民夫修驿站以通之，四川巡抚兼察康藏，后转设专职驻藏大臣，赐金印，驻军三千，兵于昌都。文祯二十年，新钞既废，帝恼之，忽问海商曰，东去重洋，其土广富金矿。帝悦之，乃诏流民东迁，人赐铳一、粟三斛，三载不税。流民掘金于河谷，岁得粗银数十万两，野邑渐成。文祯三十二年，黎洲流民拓地千里，金山汉街栉比，帝始设宣慰司，都于坤宇，命进士王守忠为都护使，岁赋输银百万。帝好文治，多修水利，通商埠。甲申以来，江南中原屡经战火，民生困苦，文帝之治，繁荣愈胜昔日。文祯四十三年，帝崩于乾清宫，年七十四。史官曰：文帝以柔克刚，解藩饷之困，开远南之疆，江南粟溢，黎洲银涌，可谓善守成矣！然察其政：《武臣敕》下，而藩镇异心、边军自足，此谓养虎贻患；宝钞既行，而豪强拒纳、税吏剖金，斯曰恤民失道。昔汉元帝委政于石显，唐文宗受制于仇宦，文帝虽无阉祸，而藩镇之弊更烈焉！谚云“宽仁生乱”，岂不信哉？-------《明史：本纪-文襄帝》"
 ming_historical_events.4.a: "不为大明之刃，必为大明之患"
 
 ming_historical_events.5.t: "《明史·靖朔帝本纪》"
 ming_historical_events.5.d: "圣宗桓皇帝"
 ming_historical_events.5.f: "靖朔皇帝讳怡钺，文宗襄皇帝第七子也，母孝静皇后吴氏。帝隆准虬髯，膂力绝伦，尝御苑引三石弓，一矢贯双麂，侍臣惊呼“神射”。文宗四十三年冬，文宗崩，太子即皇帝位，改元靖朔。时五军都督府拥兵自固，帝登坛誓师：“昔烈祖五伐未竟之志，朕当提三尺剑酬之！”\n五年春，宣大都督马雄鸣献漠南骏马千匹，帝亲驰校场，蹄烟蔽日。忽勒马西指曰：“哈密故土，岂容准夷鼾睡？”遂点榆园锐卒八万，裹百日粮西征。师次酒泉，值大风雪，旌旗冻裂。帝解貂裘予士卒，夜持长槊立辕门，须眉尽冰。将士感泣，一鼓破哈密，兵至龟兹，准酋葛尔丹策零北遁。乃铸铁碑于天山，铭曰“圣武靖朔”。大兵返于玉门，帝大喜，诗曰：“朔气横雕弓，天山雪化甲。玉门沙似金，为我洗胡马。烽燧尽汉旌，驼铃鸣凯下。一箭定龟兹，何须班定远？遥望长安月，犹照烈祖剑。燕然石未勒，此身敢言倦！”设卫所抚之，乃班师。\n越三年，车里土司刀干孟结三十六峒作乱，焚腾越驿。帝命大西营督师李定国裔孙李嗣兴会京营讨之。嗣兴佯退诱敌，密遣象兵伏澜沧江谷。及叛酋渡半，巨象突践，俘斩三万。捷至，帝割犀带赐嗣兴曰：“卿不坠宁宇王英风！”由是土司具降，西南遂安。\n又五年，荷兰红夷焚兰芳，戮华商三百。帝震怒，召舟师提督陈泽于乾清宫，掷剑令曰：“不屠巴城，勿归见朕！”泽率巨舰百二十艘，乘月夜潮突袭满剌加。是役也，焚夷舰如炬，血染海峡。红夷缚酋献金乞和，帝笑纳其币，旋敕曰：“夷性犬羊，今断其爪牙可矣。”遂罢兵。琉球闻之，遣使献《洪武朝贡图》，东海诸岛复奉正朔。\n帝见西北绥靖、南洋宾服，遂决意北伐。二十三年秋，倾京营二十万出紫荆关，旌旗绵延四十里。初至涿州，八旗望“靖朔”纛辄溃。然帝轻敌，命轻骑逐北。至房山深谷，虏伏尽起，英制火炮裂崖石，神机营铳械尽没。溃兵争渡拒马河，溺毙相枕。帝单骑走脱，夜宿农家，割发置案曰：“朕负烈祖矣！”天明收残卒六万，退保济南。是谓“戊戌之溃”，明之精锐自此空。\n为补军亏，靖朔三十六年诏增黎洲矿税三成。金山矿夫王三麻断指血书：“皮骨已枯槁，税吏犹剜心！”宣慰使呈之，帝掷书丹墀：“野氓安敢抗天子？”明年春，商船“安海号”泊金山港，税吏强征苏绸。青壮愤起，投火焚舶，锦灰蔽海三日，史称“焚丝之变”。明卒守黎洲者寡，多不恋战，及义军势起，多降之，及帝闻黎洲立国，帝目眦尽裂，叱令工部造十丈楼船百艘征之。户部尚书抱籍跪泣：“当今库银仅二十万两，尚欠宣大军饷，京营重建亦须巨资，而一舰需费六十万两！”帝仰天椎案：“朕不得为永乐乎？”掷斧斤于地。遂颁《锁洲令》：“片帆不得渡东溟！”\n五十七年，安南阮福映弑主自立，僭称“大南皇帝”。帝命宣大都督沐昌明帅师十万南征，六皇子伯洵监，南军战于富良江，安南象阵欲冲明军，昌明令火铳齐射，象惊反奔，踏阮军十里。大军围升龙，伯洵树《洪武赐印图》于阵前，呼：“黎氏旧臣降者免死！”，城门遂开，贼酋南遁。初置布政司，强推《明律》，禁土司祀雒龙君，致清化民变，交趾汹汹，既平，伯洵驰奏：“夷俗不可骤革。”。帝悟之，诏改宣慰司，封伯洵安南亲王，敕曰：“夷汉别俗，当顺其性。”亲绘《三抚图》赐之：一抚免丁税，二抚存祠庙，三抚通婚媾。六十四年，帝已病亟，犹指北舆图曰：“燕蓟……”语绝而崩，年七十九。是夕天雷碎孝陵石马，金陵童谣曰：“烈祖霹雳鞭，靖朔不得眠。”维承安元年，孝子嗣皇帝伯溱，谨奉金册上尊谥：圣宗奋武，桓震八荒。收交趾而铜柱立，定天山而胡马喑。然黎洲烟蔽海，燕蓙恨凝霜。谨循谥法，曰桓皇帝。伏惟圣灵，永鉴玄穹！\n史臣曰：帝以霸王之资，骋六合之志。西收哈密，南服交趾，东海波澄，何其雄也！然戊戌一蹶，弃甲如山；黎洲再乱，裂土海外。昔符坚投鞭断流，终败淝水；隋炀龙舟蔽江，卒殒江都。刚猛苛厉，虽暂震戎狄，终溃于萧墙。语曰“好战者亡”，靖朔之谓欤？"
