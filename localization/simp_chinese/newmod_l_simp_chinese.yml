 je_ming_warlord:0 "五军都督府"
 je_ming_warlord_reason:0 "都督府是帝国军队的将军和指挥官们的系统组织，他们主管国家的军事，并且因为卫所制度的遗留，不少成组织的军队势力拥有自己的土地和势力范围。一方面他们是帝国抵抗外敌的中坚力量，另一方面他们也为帝国造成了不少麻烦，我们必须合理对待他们，逐步改革。\n[concept_zhongwuwang]光复南京以后，重新设立了五军都督府，[concept_wenzhen]皇帝为了缓和藩镇的矛盾，颁布了《武臣敕谕》导致了五军都督府的权力扩大。[concept_jingsu]北伐的失利导致京营被严重削弱，导致地方更加尾大不掉。[concept_chengan]试图缓慢的改革来解决五军都督府的割据问题。"
 je_ming_warlord_lobby:0 "$je_ming_warlord_reason$"
 je_ming_warlord_goal:0 "军阀的势力可以通过以下方式改变：\n1.军队势力举足轻重会增加势力\n2.军队处于政府中会增加势力\n3.扶持军队派系会增加势力\n4.军队态度低于中立会增加势力\n5.打压军队会降低势力\n6.军队属于边缘派系会降低势力\n7.军队处于忠诚会降低势力\n8.国家对外开战期间，军队的势力会扩张，忠诚度也会增加"
 je_ming_warlord_fail:0 "如果军阀势力失控，或者他们的对朝廷不忠，后果将会是灾难性的......"
 je_ming_warlord_tt:0 "#BOLD 兵部改革可以彻底废除五军都督府，并成立新的国防部#!\n军阀的势力可以通过以下方式改变：\n1.军队势力举足轻重会增加势力\n2.军队处于政府中会增加势力\n3.扶持军队派系会增加势力\n4.军队态度低于中立会增加势力\n5.打压军队会降低势力\n6.军队属于边缘派系会降低势力\n7.军队处于忠诚会降低势力\n8.国家对外开战期间，军队的势力会扩张，忠诚度也会增加\n9.决议中增加军费可以同时增加军队好感和减少势力。\n10.兵部决议中对军队有益的决议可以增加军队的好感。"
 je_ming_warlord2_tt:0 "失去军队势力对军事的影响buff。"
