 journal_entry_goal_progress_abolished_headtax_peasant_belief:0 "TIPS：善待农民，打压地主，避免饥荒，稳步推进土地改革"

 shishen_ingovernment_tt: "士绅重新执政，民众感觉受到了欺骗，不要让地主进入政府"
 shishen_famine_tt: "肆虐的饥荒"
 shishen_famine_1_tt: "正在救济的饥荒"
 shishen_shiye_tt: "省份失业"
 shishen_not_famine_tt:0 "没有饥荒"
 
 ming_events.2.t:0 "打压士绅"
 ming_events.2.d:0 "这是一个几乎疯狂的决定，帝国终于决定对困扰朝堂已久的士绅们动手了！一系列对士绅的优待条件被取消，许多文官表现出了无比的震惊，朝堂上瞬间乱成一锅粥！大明王朝终于迎来了一个历史的转折点。"
 ming_events.2.f:0 "他们不知道我们的下一步将会更加激进！"
 ming_events.2.a:0 "这只是我们的第一步"
 
 ming_events.3.t:0 "士绅优待"
 ming_events.3.d:0 "士大夫是我国行政机构的基石，维系着天朝上下的儒学传承和天命的维护，他们是我们能够运行着庞大帝国的保障和税收制度的基础。因此，给予他们一些优待也是可以理解的。自洪武皇帝开始，我们就对士大夫进行了科举方面的优待，以及全方位的减免税款。"
 ming_events.3.f:0 "但这不代表我们将会继续这么做。"
 ming_events.3.a:0 "士绅优待终将被取缔"
 ming_events_3_tt:0 "我国土地被士绅大量私藏，如果要解决这个问题必须通过决议清查所有土地。"
 
 ming_events.4.t:0 "成功结束[SCOPE.sState('current_measuring_provinces').GetName]的丈量工作"
 ming_events.4.d:0 "经过辛勤的劳动，我们终于完成了[SCOPE.sState('current_measuring_provinces').GetName]的土地丈量工作，相关的田亩数据已经造册送往中央，再也没有人能够瞒报实际情况了！"
 ming_events.4.f:0 "这是我们加大对地方控制的第一步"
 ming_events.4.a:0 "非常棒"
 
 ming_events.5.t:0 "[SCOPE.sState('current_measuring_provinces').GetName]的严重贪污"
 ming_events.5.d:0 "我们在[SCOPE.sState('current_measuring_provinces').GetName]的丈量工作中遇到了前所未有的困难，我们发现了大量被官府私藏的土地，如果轻举妄动，可能会造成当地官场的大面积波动。"
 ming_events.5.f:0 "这显然是一种公开的腐败行为"
 ming_events.5.a:0 "立刻停止调查！"
 ming_events.5.b:0 "彻查所有贪污者！"
 
 ming_events.6.t:0 "[SCOPE.sState('current_measuring_provinces').GetName]的皇庄财产"
 ming_events.6.d:0 "在[SCOPE.sState('current_measuring_provinces').GetName]的土地清查工作正遇到一个棘手的问题，我们在[SCOPE.sState('current_measuring_provinces').GetName]发现了数额巨大的皇家庄园，他们不需要交税，收入也完全归皇帝本人所有。是否要把这片皇帝的私人庄园也写进账本呢？"
 ming_events.6.f:0 "这可是皇帝的财产，你疯了吗？"
 ming_events.6.a:0 "不要动这片皇庄"
 ming_events.6.b:0 "我们应该对所有人一视同仁"
 
 ming_events.7.t:0 "[SCOPE.sState('current_measuring_provinces').GetName]的测绘毫无进展"
 ming_events.7.d:0 "[SCOPE.sState('current_measuring_provinces').GetName]地区的情况错综复杂，我们没能取得任何进展，调查将会继续开展。"
 ming_events.7.f:0 "这是很常见的场景，复杂的地方情况让措手不及的到任官员需要逐步适应。"
 ming_events.7.a:0 "我知道了"
 ming_events.7.b:0 "不能停下！所有人加班工作！"
 
 ming_events.8.t:0 "[SCOPE.sState('current_measuring_provinces').GetName]地区的官商勾结"
 ming_events.8.d:0 "在我们的调查走访中，发现[SCOPE.sState('current_measuring_provinces').GetName]的商人和当地政府合作，占用了大量的农田用于其他用途，但是这片区域却被当地政府登记为未开垦的荒地。"
 ming_events.8.f:0 "这是很明显的官商合流，必须制止这种情况！"
 ming_events.8.a:0 "惩治当地政府和商人！"
 ming_events.8.b:0 "只要补交税款，我们可以不管。"
 
 ming_events.21.t:0 "[SCOPE.sState('current_measuring_provinces').GetName]地区的军队腐败"
 ming_events.21.d:0 "在我们的调查走访中，发现[SCOPE.sState('current_measuring_provinces').GetName]的的军队以屯田的名义占用了大批良田，卫所的士兵已经沦为农奴为长官耕作，并且还能以屯田的名义免除一切税收。"
 ming_events.21.f:0 "简直令人发指！"
 ming_events.21.a:0 "清查军队的腐败情况！"
 ming_events.21.b:0 "不要惹恼这帮人"
 
 ming_events.9.t:0 "藩镇遍布全国"
 ming_events.9.d:0 "在对抗大清的过程中，各路英雄豪杰纷纷涌现，造就了我国如今四处林立的军阀，他们是我们对抗外敌的有利屏障，但同时也威胁着我们的统治。"
 ming_events.9.f:0 "我们应当迅速削弱他们的影响，让皇帝重新集中权力！"
 ming_events.9.a:0 "已阅。"
 ming_events.9.b:0 "告诉我更多！"
 ming_events_9_tt:0 "藩镇控制着我国的边疆地区，我们必须小心对待他们。"
 
 ming_events.10.t:0 "军阀作乱"
 ming_events.10.d:0 "失控的军阀发动了暴动，原本镇守四方的将军们突然对政府发难，帝国陷入了一片混乱。"
 ming_events.10.f:0 "祈祷上天能够继续保佑我们的统治，戡乱这些逆贼"
 ming_events.10.a:0 "明朝会继续复兴！"
 ming_events.10.b:0 "大顺会夺取天下！"
 ming_events.10.c:0 "大西将统一中国！"
 ming_events.10.h:0 "郑家将重整江山！"
 
 ming_events.11.t:0 "北方领土问题"
 ming_events.11.d:0 "一百多年前，我们击败了清军，收复了大片国土，但是郑将军却折戟燕京，辽东和燕云地区一直是我们帝国梦魂萦绕的土地，现在是时候将他们重新纳入统治了！。"
 ming_events.11.f:0 "胡虏腥尘遍九州,忠臣义士怀悲愁.\n既无博浪子房击,须效中流祖逖舟.\n故国山河尽变色,旧京宫阙化成丘.\n复仇雪耻知何日,不斩楼兰誓不休."
 ming_events.11.a:0 "收复故土！"
 
 ming_events.12.t:0 "东北光复"
 ming_events.12.d:0 "我们终于在铁与血中收复了我们的故土，证明了我们是中国的唯一合法统治者。"
 ming_events.12.f:0 "日月河山，泱泱华夏。"
 ming_events.12.a:0 "大明万岁！"
 ming_events.12.b:0 "迁回旧都！"
 
 ming_events.13.t:0 "淡忘的土地"
 ming_events.13.d:0 "对于已经习惯了目前生活的汉人，东北的同胞已经成了可有可无的东西，也许该被解救的并不是他们，而是我们自己。"
 ming_events.13.f:0 "北京和辽东不再被视作我们的故土了，这将成为我们民族永远的痛楚。"
 ming_events.13.a:0 "结束了。"
 
 ming_events.14.t:0 "民族的未来"
 ming_events.14.d:0 "满洲的汗国已经成为历史，满洲人也从此成为了天子治理下普通的一支部落子民，我们要怎样面对这些新加入我们帝国的人？"
 ming_events.14.f:0 "从宋代开始的数百年敌对让我们的百姓难以接受他们成为我们的一部分，但是对他们的敌视也会导致新领土的动荡不安。"
 ming_events.14.a:0 "不论满汉，都是大明子民！"
 ming_events.14.b:0 "关外的蛮夷没有资格提出要求！"
 
 ming_events.15.t:0 "关外的敌人"
 ming_events.15.d:0 "满洲人和我们仍处于对峙状态，有时我们的关系会缓和，有时冲突会加剧，但是永不停息。"
 ming_events.15.f:0 "帝国必须解决这个问题。"
 ming_events.15.a:0 "愿上天保佑[SCOPE.GetRootScope.GetCountry.GetName]。"
 
 ming_events.16.t:0 "游牧民族的终结"
 ming_events.16.d:0 "数千年来，游牧民族一直是中原的危险，但是今天这一切将会改变，[SCOPE.GetRootScope.GetCountry.GetName]已经有了足够的能力彻底解决游牧民的危机。"
 ming_events.16.f:0 "我们要让草原之上再无战火！"
 ming_events.16.a:0 "将所有游牧地区统一在[SCOPE.GetRootScope.GetCountry.GetName]的统治之下。"
 ming_events.16.b:0 "那些荒凉的土地不值得我们费心。"
 
 ming_events.17.t:0 "游牧时代的结束"
 ming_events.17.d:0 "经过漫长的斗争，整个西北地区都归于伟大[SCOPE.GetRootScope.GetCountry.GetName]天子的统治，现在是时候解决蒙古人的归属问题了。"
 ming_events.17.f:0 "我们如何对待这一新加入我国的人民？"
 ming_events.17.a:0 "他们也是[SCOPE.GetRootScope.GetCountry.GetName]的子民"
 ming_events.17.b:0 "我们不与这些野蛮人为伍，汉人将自己开拓西域。"
 
 je_xiyu_duhu:0 "西域都护"
 je_xiyu_duhu_reason:0 "在西域被侵占的漫长岁月中，这里已经被深度胡化，天朝上国对于当地人只是一个遥远而模糊的概念。我们有责任将他们重新纳入停止，让天朝的秩序取代无尽的纷争，让各族人民都能和谐地生活在我们帝国的庇护之下！"
 je_xiyu_duhu_goal:0 ""

 je_anfu_monglia:0 "漠北计划"
 je_anfu_monglia_reason:0 "自古以来，草原的游牧民族就是中原王朝的心腹大患。它们游离于文明世界之外，与残酷的自然环境进行殊死斗争。为了生存，他们不得不向中原发动袭击，造成了我们长久以来的边患。不过这种情况即将成为历史。在我们的统治下，漠北人也能过上安定的生活，长城内外将不再有隔阂存在！"
 ming_mogol:0 "生长于马背之上"
 
 cnl_events.1.t:0 "开拓新土地"
 cnl_events.1.d:0 "他们建国几十年，人民安居乐业生机勃勃，一座座城市沿着海岸线建立起来。不过有些激进的年轻人不满足这些现状，他们认为向东继续开拓有利于我国的继续发展壮大，只有不断进去才能寻找到新的机会。"
 cnl_events.1.f:0 "不过我猜那些刚刚在土地上安顿下来的人们对此并无兴趣。"
 cnl_events.1.a:0 "向东部进发！"
 cnl_events.1.b:0 "还是先发展本土吧。"
 
