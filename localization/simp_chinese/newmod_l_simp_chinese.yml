 je_china_shehuizhuyi_1_reason: "不管黑猫还是白猫，能抓老鼠就是好猫。过于纠结阶级斗争的问题造成了我们前期工作中对经济建设工作的漠视，人民群众的生活水平没有得到很好的保障和提升。但是现在不一样了，拥抱世界市场会给我们新的选择。我们相信，庞大的海外资金可以为我们这篇古老的国度注入新的生机！"
