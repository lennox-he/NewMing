 button_jap_dabeny_1_desc:0 "我们将提拔对我方政府友好的军官，此举将使整个#YELLOW 陆军#!满意，并让我方获得有用的盟友。"
 button_jap_dabeny_2_desc:0 "增加#YELLOW 陆军#!的预算肯定能使他们支持政府。"
 button_jap_dabeny_3_desc:0 "政府将以某些原因，贬职几位被认为是不听指挥的#YELLOW 陆军#!军官。此举将使陆军更加#RED 独行其是。#！"
 button_jap_dabeny_4_desc:0 "削减#YELLOW 陆军#!预算可以给我们省点钱，但他们肯定不喜欢这样。"
 button_jap_dabeny_5_desc:0 "我们将提拔对我方政府友好的军官，此举将使整个#BLUE 海军#!满意，并让我方获得有用的盟友。"
 button_jap_dabeny_6_desc:0 "增加#BLUE 海军#!的预算肯定能使他们支持政府。"
 button_jap_dabeny_7_desc:0 "政府将以某些原因，贬职几位被认为是不听指挥的#BLUE 海军#!军官。此举将使陆军更加#RED 独行其是。#！"
 button_jap_dabeny_8_desc:0 "削减#BLUE 海军#!预算可以给我们省点钱，但他们肯定不喜欢这样。"
 button_jap_dabeny_9_desc:0 "通过举办陆海两军协作训练项目，我们可以稍微增加两军对我们的支持，并降低军方独走度。"
 button_jap_dabeny_10_desc:0 "投入更多的资金，我们可以进行需要军中间合作的复杂军事演习，从而增加陆海两军对我们的支持，并显著降低独走度。"
 button_jap_dabeny_11_desc:0 "打击海陆两军内部的腐败可以降低独走度，但我们会失去一定的支持，比较没有人愿意家丑外扬。"
 button_jap_dabeny_12_desc:0 "我们可以采取严厉措施，让军队难以制造动荡，而这么做会极大损害我们与两军间的关系。这本书就可能导致严重后果。"
 
